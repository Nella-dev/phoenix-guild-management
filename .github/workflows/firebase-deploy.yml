name: Deploy (Firebase + Cloudflare Pages)

on:
  push:
    branches:
      - genspark_ai_developer

  workflow_dispatch:

jobs:
  deploy-firebase:
    name: Firebase Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: guild_app/functions/package-lock.json
      - name: Functions 패키지 설치
        run: |
          cd guild_app/functions
          npm ci --production
      - name: Firebase CLI 설치
        run: npm install -g firebase-tools
      - name: Firebase 배포
        run: |
          cd guild_app
          firebase deploy --token "${{ secrets.FIREBASE_TOKEN }}" --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

  deploy-cloudflare:
    name: Cloudflare Pages Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Wrangler 설치
        run: npm install -g wrangler
      - name: Cloudflare Pages 배포
        run: |
          wrangler pages deploy guild_app \
            --project-name phoenix-guild-management \
            --branch genspark_ai_developer \
            --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
