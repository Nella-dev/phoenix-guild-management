<style>
/* ── 헤더 ───────────────────────────────────────── */
header{display:flex!important;justify-content:space-between!important;align-items:center!important;
  padding:10px 15px!important;background:#121721!important;border-bottom:1px solid #2a3242!important;
  min-height:clamp(48px,8vw,60px)!important;box-sizing:border-box!important;position:fixed!important;
  top:0!important;width:100%;z-index:2000!important;box-shadow:0 2px 10px rgba(0,0,0,.3)!important;}
.header-left{display:flex!important;align-items:center!important;gap:12px!important;}
.logo{white-space:nowrap!important;color:#f4c430;font-weight:bold;font-size:clamp(14px,3vw,18px);text-decoration:none;}

/* ── 페이지 타이틀 ───────────────────────────────── */
.page-hdr{margin-bottom:clamp(18px,3vw,28px);}
.page-hdr h2{color:#f4c430;font-size:clamp(17px,3.8vw,23px);margin:0 0 5px;
  font-weight:bold;display:flex;align-items:center;flex-wrap:wrap;gap:8px;}
.page-hdr p{color:#666;font-size:clamp(11px,2vw,13px);margin:0;}

/* ── LIVE 뱃지 ───────────────────────────────────── */
.live-badge{display:inline-flex;align-items:center;gap:4px;
  background:rgba(0,230,118,.1);border:1px solid rgba(0,230,118,.3);
  border-radius:20px;padding:2px 9px;font-size:clamp(9px,1.6vw,11px);color:#00e676;}
.live-dot{width:6px;height:6px;border-radius:50%;background:#00e676;animation:blink 1.4s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* ── 피드 리스트 (최신글 맨 위, 세로 피드) ───────── */
.feed-list{display:flex;flex-direction:column;gap:clamp(14px,3vw,20px);}

/* ── 피드 카드 ───────────────────────────────────── */
.feed-card{
  background:#13171f;
  border:1px solid #1e2535;
  border-radius:clamp(10px,2vw,16px);
  overflow:hidden;
  transition:border-color .25s, box-shadow .25s;
}
.feed-card:hover{
  border-color:#2e3a52;
  box-shadow:0 4px 20px rgba(0,0,0,.4);
}

/* 카드 헤더 — 작성자 정보 */
.card-header{
  display:flex;align-items:center;gap:10px;
  padding:clamp(12px,2.5vw,16px) clamp(12px,2.5vw,18px) 0;
}
.card-avatar{
  width:clamp(32px,5vw,40px);height:clamp(32px,5vw,40px);
  border-radius:50%;overflow:hidden;flex-shrink:0;
  background:linear-gradient(135deg,#5865f2,#eb459e);
  display:flex;align-items:center;justify-content:center;
  font-size:clamp(13px,2.2vw,16px);font-weight:bold;color:#fff;
}
.card-avatar img{width:100%;height:100%;object-fit:cover;}
.card-author-info{flex:1;min-width:0;}
.card-author{font-size:clamp(12px,2.2vw,14px);font-weight:600;color:#c0c8d8;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-date{font-size:clamp(10px,1.7vw,12px);color:#444;margin-top:2px;}
.card-channel{font-size:clamp(9px,1.5vw,11px);background:rgba(88,101,242,.12);
  color:#7083c0;border:1px solid rgba(88,101,242,.2);border-radius:10px;
  padding:2px 8px;white-space:nowrap;flex-shrink:0;}

/* 카드 본문 */
.card-body-text{
  padding:clamp(10px,2vw,14px) clamp(12px,2.5vw,18px);
  font-size:clamp(12px,2.2vw,14px);color:#b8c5d0;
  line-height:1.75;word-break:break-word;
}
.card-body-text a{color:#7db3ff;text-decoration:none;word-break:break-all;}
.card-body-text a:hover{text-decoration:underline;}
.card-body-text b{color:#e6e6e6;}

/* 이미지 그리드 */
.card-images{padding:0 clamp(12px,2.5vw,18px) clamp(12px,2.5vw,16px);}
.img-grid-1 img{width:100%;border-radius:10px;display:block;cursor:pointer;
  max-height:480px;object-fit:contain;background:#0d1018;}
.img-grid-2,.img-grid-3,.img-grid-4{display:grid;gap:4px;}
.img-grid-2{grid-template-columns:1fr 1fr;}
.img-grid-3{grid-template-columns:1fr 1fr 1fr;}
.img-grid-4{grid-template-columns:1fr 1fr;}
.img-grid-2 img,.img-grid-3 img,.img-grid-4 img{
  width:100%;aspect-ratio:1/1;object-fit:cover;border-radius:8px;cursor:pointer;
  display:block;transition:opacity .2s;}
.img-grid-2 img:hover,.img-grid-3 img:hover,.img-grid-4 img:hover{opacity:.85;}
/* 4개 이상일 때 마지막에 +N 오버레이 */
.img-more-wrap{position:relative;display:block;}
.img-more-overlay{position:absolute;inset:0;background:rgba(0,0,0,.6);
  border-radius:8px;display:flex;align-items:center;justify-content:center;
  font-size:clamp(16px,3vw,22px);font-weight:bold;color:#fff;pointer-events:none;}

/* ── 이미지 라이트박스 ───────────────────────────── */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);
  z-index:9000;align-items:center;justify-content:center;}
.lightbox.active{display:flex;}
.lb-img{max-width:94vw;max-height:92vh;object-fit:contain;border-radius:8px;display:block;}
.lb-close{position:absolute;top:14px;right:18px;background:rgba(255,255,255,.12);
  border:none;color:#fff;font-size:22px;width:40px;height:40px;border-radius:50%;
  cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;}
.lb-close:hover{background:rgba(255,255,255,.25);}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);
  background:rgba(255,255,255,.1);border:none;color:#fff;width:44px;height:44px;
  border-radius:50%;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .2s;}
.lb-nav:hover{background:rgba(255,255,255,.25);}
.lb-prev{left:14px;} .lb-next{right:14px;}
.lb-counter{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.6);color:#fff;font-size:13px;padding:4px 14px;border-radius:20px;}

/* ── 스켈레톤 ───────────────────────────────────── */
.sk-card{background:#13171f;border:1px solid #1e2535;border-radius:clamp(10px,2vw,16px);
  overflow:hidden;padding:clamp(12px,2.5vw,16px);}
.sk{background:#1c2230;border-radius:6px;animation:shimmer 1.6s infinite;}
.sk-av{width:38px;height:38px;border-radius:50%;flex-shrink:0;}
.sk-line{height:12px;margin-bottom:8px;}
@keyframes shimmer{0%{opacity:.35}50%{opacity:.6}100%{opacity:.35}}

/* 빈 상태 */
.empty-state{text-align:center;padding:70px 20px;color:#444;}
.empty-icon{font-size:52px;margin-bottom:14px;}
.empty-state p{font-size:clamp(12px,2.2vw,14px);line-height:1.7;}

/* 로드 더보기 */
.load-more-wrap{text-align:center;margin-top:clamp(16px,3vw,24px);}
.load-more-btn{padding:clamp(10px,2vw,13px) clamp(24px,4vw,36px);

  border-radius:8px;font-size:clamp(13px,2.3vw,14px);cursor:pointer;transition:all .2s;}
.load-more-btn:hover{background:rgba(255,255,255,.12);color:#fff;}
.load-more-btn:disabled{opacity:.4;cursor:not-allowed;}
</style>

<script>
// ════════════════════════════════════════════
//  얍할라 가이드 — Discord 실시간 피드
//  Firestore 컬렉션: yaphalla_guide_posts
//  최신글 맨 위, 이미지 그리드, 라이트박스
// ════════════════════════════════════════════

const COLLECTION   = 'yaphalla_guide_posts';
const PAGE_SIZE    = 20;

let allPosts       = [];
let lastDoc        = null;
let isLoading      = false;
let hasMore        = true;

// ── 라이트박스 상태 ────────────────────────
let lbImages       = [];
let lbIndex        = 0;

// ── 인증 ──────────────────────────────────
firebase.auth().onAuthStateChanged(function(user){
  if(!user){ location.href='login.html'; return; }
  firebase.firestore().collection('users').doc(user.uid).get().then(doc=>{
    if(!doc.exists){ location.href='login.html'; return; }
    const d = doc.data();
    if(!d.approved){ location.href='pending.html'; return; }

    document.getElementById('userName').textContent = d.nickname||user.displayName||'?';
    const roleEl = document.getElementById('myRoleBadge');
    if(roleEl){
      const r = d.role||'member';
      roleEl.textContent = r==='admin'?'관리자':r==='manager'?'운영진':'길드원';
      roleEl.className   = r==='admin'?'role-badge role-admin':r==='manager'?'role-badge role-staff':'role-badge role-member';
      if(r==='admin'||r==='manager'){
        const m = document.getElementById('navAdminMenu');
        if(m) m.style.display='';
      }
    }
    document.getElementById('profileChangeBtn').style.display='';

    function hideLoading() {
  const overlay = document.getElementById('loadingOverlay');
  if (overlay) overlay.style.display = 'none';
}
}
    startFeed();
    if(typeof hideLoading==='function') hideLoading();
  }).catch(()=>{ location.href='login.html'; });
});

// ── 초기 피드 로드 ─────────────────────────
function startFeed(){
  isLoading = true;

  firebase.firestore()
    .collection(COLLECTION)
    .where('visible','==',true)
    .orderBy('discordTimestamp','desc')
    .limit(PAGE_SIZE)
    .onSnapshot(snap=>{
      document.getElementById('skeletonArea').style.display='none';

      allPosts = [];
      snap.forEach(doc => allPosts.push({ id: doc.id, ...doc.data() }));
      lastDoc = snap.docs[snap.docs.length - 1] || null;
      hasMore = snap.docs.length >= PAGE_SIZE;

     renderFeed();
isLoading = false;
hideLoading();
    }, err=>{
  console.error('Feed error:', err);
  document.getElementById('skeletonArea').style.display='none';
  isLoading = false;
  hideLoading();
}
    };
}

// ── 더보기 ────────────────────────────────
async function loadMore(){
  if(isLoading || !hasMore || !lastDoc) return;
  isLoading = true;
  const btn = document.getElementById('loadMoreBtn');
  btn.disabled = true;
  btn.textContent = '불러오는 중...';

  try{
    const snap = await firebase.firestore()
      .collection(COLLECTION)
      .where('visible','==',true)
      .orderBy('discordTimestamp','desc')
      .startAfter(lastDoc)
      .limit(PAGE_SIZE)
      .get();

    const newPosts = [];
    snap.forEach(doc => newPosts.push({ id: doc.id, ...doc.data() }));
    lastDoc = snap.docs[snap.docs.length - 1] || lastDoc;
    hasMore = snap.docs.length >= PAGE_SIZE;

    allPosts = [...allPosts, ...newPosts];
    renderFeed();
  }catch(e){
    console.error('LoadMore error:', e);
  }

  isLoading = false;
  btn.disabled = false;
  btn.textContent = '더 보기';
}

// ── 피드 렌더링 ───────────────────────────
function renderFeed(){
  const feed  = document.getElementById('feedList');
  const empty = document.getElementById('emptyState');
  const lmw   = document.getElementById('loadMoreWrap');

  if(allPosts.length === 0){
    feed.style.display  = 'none';
    empty.style.display = 'block';
    lmw.style.display   = 'none';
    return;
  }

  empty.style.display = 'none';
  feed.innerHTML = allPosts.map(buildCard).join('');
  feed.style.display = '';

  lmw.style.display = hasMore ? '' : 'none';
}

// ── 카드 빌더 ─────────────────────────────
function buildCard(p){
  /* 아바타 */
  const avHtml = p.authorAvatar
    ? `<img src="${escH(p.authorAvatar)}" alt="" loading="lazy" onerror="this.style.display='none'">`
    : `<span>${escH((p.authorName||'?')[0].toUpperCase())}</span>`;

  /* 날짜 */
  const dateStr = fmtDate(p.discordTimestamp || p.createdAt);

  /* 채널 뱃지 */
  const channelHtml = p.channelName
    ? `<span class="card-channel">#${escH(p.channelName)}</span>` : '';

  /* 본문 */
  const bodyHtml = p.content
    ? `<div class="card-body-text">${formatContent(p.content)}</div>` : '';

  /* 이미지 그리드 */
  const imgs = p.imageUrls || [];
  let imgsHtml = '';
  if(imgs.length > 0){
    const postId = escH(p.id);
    const allImgsJson = escH(JSON.stringify(imgs));
    if(imgs.length === 1){
      imgsHtml = `<div class="card-images"><div class="img-grid-1">
        <img src="${escH(imgs[0])}" alt="" loading="lazy"
             onclick="openLightbox(${allImgsJson},0)"
             onerror="this.parentElement.style.display='none'">
      </div></div>`;
    } else {
      const gridClass = imgs.length === 2 ? 'img-grid-2'
                      : imgs.length === 3 ? 'img-grid-3' : 'img-grid-4';
      const showCount = imgs.length <= 4 ? imgs.length : 4;
      const tiles = imgs.slice(0, showCount).map((url, i) => {
        const isLast = imgs.length > 4 && i === 3;
        const inner  = `<img src="${escH(url)}" alt="" loading="lazy"
                             onclick="openLightbox(${allImgsJson},${i})"
                             onerror="this.parentElement.style.display='none'">`;
        if(isLast){
          return `<div class="img-more-wrap" onclick="openLightbox(${allImgsJson},3)">
            ${inner}
            <div class="img-more-overlay">+${imgs.length - 3}</div>
          </div>`;
        }
        return inner;
      }).join('');
      imgsHtml = `<div class="card-images"><div class="${gridClass}">${tiles}</div></div>`;
    }
  }

  return `
  <div class="feed-card" data-id="${escH(p.id)}">
    <div class="card-header">
      <div class="card-avatar">${avHtml}</div>
      <div class="card-author-info">
        <div class="card-author">${escH(p.authorName||'?')}</div>
        <div class="card-date">${dateStr}</div>
      </div>
      ${channelHtml}
    </div>
    ${bodyHtml}
    ${imgsHtml}
  </div>`;
}

// ── 라이트박스 ────────────────────────────
function openLightbox(imgsJson, startIdx){
  try{
    lbImages = typeof imgsJson === 'string' ? JSON.parse(imgsJson) : imgsJson;
  }catch(e){ return; }
  lbIndex = startIdx || 0;
  updateLightbox();
  document.getElementById('lightbox').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function updateLightbox(){
  const img  = document.getElementById('lbImg');
  const cnt  = document.getElementById('lbCounter');
  const prev = document.getElementById('lbPrev');
  const next = document.getElementById('lbNext');
  img.src    = lbImages[lbIndex] || '';
  cnt.textContent = lbImages.length > 1 ? `${lbIndex+1} / ${lbImages.length}` : '';
  prev.style.display = lbImages.length > 1 ? '' : 'none';
  next.style.display = lbImages.length > 1 ? '' : 'none';
}

function lbDir(dir){
  lbIndex = (lbIndex + dir + lbImages.length) % lbImages.length;
  updateLightbox();
}

function closeLightbox(){
  document.getElementById('lightbox').classList.remove('active');
  document.body.style.overflow = '';
}

function handleLbClick(e){
  if(e.target === document.getElementById('lightbox')) closeLightbox();
}

// ── 텍스트 포맷 ───────────────────────────
function formatContent(t){
  if(!t) return '';
  let s = escH(t);
  // 볼드 **text**
  s = s.replace(/\*\*(.+?)\*\*/g, '<b>$1</b>');
  // 이탤릭 *text*
  s = s.replace(/\*([^*\n]+?)\*/g, '<i>$1</i>');
  // URL 링크화
  s = s.replace(/(https?:\/\/[^\s<>"'\)\]]+)/g,
    '<a href="$1" target="_blank" rel="noopener">$1</a>');
  // 줄바꿈
  s = s.replace(/\n/g, '<br>');
  return `<p>${s}</p>`;
}

// ── 날짜 포맷 ─────────────────────────────
function fmtDate(ts){
  try{
    let d;
    if(ts && ts.toDate)      d = ts.toDate();
    else if(ts && ts.seconds) d = new Date(ts.seconds * 1000);
    else if(typeof ts === 'number') d = new Date(ts);
    else return '';
    const now  = new Date();
    const diff = Math.floor((now - d) / 1000);
    if(diff < 60)    return '방금 전';
    if(diff < 3600)  return Math.floor(diff/60) + '분 전';
    if(diff < 86400) return Math.floor(diff/3600) + '시간 전';
    if(diff < 604800)return Math.floor(diff/86400) + '일 전';
    const mo = String(d.getMonth()+1).padStart(2,'0');
    const dy = String(d.getDate()).padStart(2,'0');
    const hh = String(d.getHours()).padStart(2,'0');
    const mm = String(d.getMinutes()).padStart(2,'0');
    return `${d.getFullYear()}.${mo}.${dy} ${hh}:${mm}`;
  }catch(e){ return ''; }
}

// ── HTML 이스케이프 ───────────────────────
function escH(s){
  if(s == null) return '';
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── 키보드 단축키 ─────────────────────────
document.addEventListener('keydown', e => {
  const lb = document.getElementById('lightbox');
  if(!lb.classList.contains('active')) return;
  if(e.key === 'Escape')      closeLightbox();
  if(e.key === 'ArrowLeft')   lbDir(-1);
  if(e.key === 'ArrowRight')  lbDir(1);
});

// ── 공통 ─────────────────────────────────
function logout(){ firebase.auth().signOut().then(()=>{ location.href='login.html'; }); }
function toggleNav(){ document.getElementById('sidebar')?.classList.toggle('open'); }
function toggleLangPage(){
  const c = localStorage.getItem('roider_lang')||'ko';
  localStorage.setItem('roider_lang', c==='ko'?'en':'ko');
  location.reload();
}
