<!DOCTYPE html>
<html lang="ko">
<head>
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
  <link rel="dns-prefetch" href="https://fonts.googleapis.com">
  <link rel="dns-prefetch" href="https://ui-avatars.com">

  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>ROIDER GUILD - 결산 내역</title>
  <link rel="stylesheet" href="header_standard.css">
  <link rel="stylesheet" href="common_style.css">
  <link rel="manifest" href="manifest.json">

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="firebase_key.js"></script>
  <script src="firebase_config.js"></script>
  <script src="ui_utils.js"></script>
  <script src="i18n.js" defer></script>
  <script src="i18n_added.js" defer></script>

  <style>
    /* ── 헤더 인라인 오버라이드 제거 (header_standard.css 위임) ── */
    header {
      position: fixed !important;
      top: 0 !important;
      width: 100% !important;
      z-index: 2000 !important;
    }
    .header-left { display:flex!important; align-items:center!important; gap:12px!important; }
    .menu-trigger { display:none; font-size:24px; color:var(--accent); background:none; border:none; cursor:pointer; padding:0; line-height:1; }

    /* ── 레이아웃 ── */
    .app-container { display:flex; padding-top:80px; min-height:100vh; }
    nav { width:280px; background:#161b22; border-right:1px solid #2a3242; height:calc(100vh - 80px); position:sticky; top:80px; z-index:1000; flex-shrink:0; overflow-y:auto; }

    @media(max-width:850px){
      .menu-trigger{display:block!important;}
      nav{position:fixed;top:0;left:-280px;width:280px;height:100%;z-index:2100;box-shadow:5px 0 15px rgba(0,0,0,.5);border-right:1px solid #2a3242;transition:left .3s ease;background:#161b22;}
      nav.active{left:0;}
      .app-container{display:block;}
      .overlay.active{display:block;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:2050;}
    }

    /* ── 사이드바 ── */
    .sidebar-user-info{padding:40px 20px 25px;background:rgba(244,196,48,.03);border-bottom:1px solid #2a3242;display:flex;flex-direction:column;align-items:center;text-align:center;position:relative;}
    .sidebar-user-info img{width:75px;height:75px;border-radius:50%;margin-bottom:12px;object-fit:cover;box-sizing:border-box;}
    .user-name-box{display:flex;flex-direction:column;align-items:center;gap:6px;margin-bottom:15px;}
    .u-name{font-size:18px;font-weight:bold;color:#fff;}
    .close-nav{position:absolute;top:15px;right:15px;background:none;border:none;color:#aaa;font-size:28px;cursor:pointer;display:none;}
    .nav-container{display:flex;flex-direction:column;padding:10px 0;}
    .nav-link{font-size:16px;padding:15px 25px;color:#ccc;text-decoration:none;border-bottom:1px solid rgba(255,255,255,.05);transition:.2s;}
    .nav-link:hover{background:rgba(255,255,255,.05);color:#fff;}
    .nav-link.active{color:#f4c430;background:rgba(244,196,48,.1);font-weight:bold;}

    /* ── 폴더 메뉴 ── */
    .nav-folder{}
    .nav-folder-header{display:flex;align-items:center;justify-content:space-between;padding:14px 25px;color:#ccc;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.03);transition:background .2s,color .2s;user-select:none;font-size:15px;}
    .nav-folder-header:hover{background:rgba(255,255,255,.05);color:#fff;}
    .nav-folder-header.open{color:#f4c430;}
    .nav-folder-title{display:flex;align-items:center;gap:8px;}
    .nav-folder-arrow{font-size:10px;transition:transform .25s;color:#666;}
    .nav-folder-header.open .nav-folder-arrow{transform:rotate(90deg);color:#f4c430;}
    .nav-folder-children{overflow:hidden;max-height:0;transition:max-height .28s ease;background:rgba(0,0,0,.15);}
    .nav-folder-children.open{max-height:300px;}
    .nav-sub-link{display:block;font-size:14px;padding:11px 25px 11px 44px;color:#aaa;text-decoration:none;border-bottom:1px solid rgba(255,255,255,.03);transition:background .15s,color .15s;}
    .nav-sub-link:hover{background:rgba(255,255,255,.05);color:#fff;}
    .nav-sub-link.active{color:#f4c430;background:rgba(244,196,48,.08);font-weight:600;}

    /* ── 메인 ── */
    .main-content{flex:1;padding:30px;box-sizing:border-box;}
    .wrap{width:100%;max-width:900px;margin:0 auto;}

    /* ── 페이지 타이틀 ── */
    .page-title{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
    .page-title h2{margin:0;color:#f4c430;font-size:1.5rem;font-weight:800;}
    .page-desc{font-size:12px;color:#666;margin-bottom:24px;}

    /* ── 네비게이션 바 (이전/다음) ── */
    .week-nav{
      display:flex;align-items:center;justify-content:center;gap:16px;
      background:#1c1f2a;border:1px solid #2a3242;border-radius:14px;
      padding:14px 20px;margin-bottom:24px;
    }
    .week-nav-btn{
      background:rgba(244,196,48,.12);border:1px solid rgba(244,196,48,.3);
      color:#f4c430;padding:8px 18px;border-radius:10px;font-size:13px;
      font-weight:700;cursor:pointer;transition:.2s;white-space:nowrap;
      display:flex;align-items:center;gap:6px;
    }
    .week-nav-btn:hover{background:rgba(244,196,48,.25);}
    .week-nav-btn:disabled{opacity:.3;cursor:not-allowed;pointer-events:none;}
    .week-nav-label{
      font-size:18px;font-weight:800;color:#fff;min-width:160px;
      text-align:center;letter-spacing:.5px;
    }
    .week-nav-label .week-sub{font-size:11px;color:#888;display:block;margin-top:2px;font-weight:400;}

    /* ── 결산 카드 ── */
    .history-card{
      background:#1c1f2a;border:1px solid #2a3242;border-radius:14px;
      padding:24px;margin-bottom:20px;
    }
    .history-card-header{
      display:flex;align-items:center;justify-content:space-between;
      flex-wrap:wrap;gap:12px;margin-bottom:18px;padding-bottom:14px;
      border-bottom:1px solid #2a3242;
    }
    .history-card-title{font-size:1.15rem;font-weight:800;color:#f4c430;}
    .history-card-meta{font-size:11px;color:#666;display:flex;flex-direction:column;gap:3px;text-align:right;}

    /* ── 보상 테이블 ── */
    .reward-table-wrap{overflow-x:auto;}
    .reward-table{width:100%;border-collapse:collapse;font-size:13px;}
    .reward-table th{background:#2a3242;color:#f4c430;padding:10px 12px;text-align:center;border:1px solid #3a4252;}
    .reward-table td{padding:10px 12px;text-align:center;border:1px solid #2a3242;background:rgba(28,31,42,.5);}
    .reward-table tr.my-row td{background:rgba(244,196,48,.08)!important;}
    .reward-table tr.my-row td:first-child{border-left:3px solid #f4c430;}
    .reward-table .rank-1{color:#ffd700;font-weight:900;font-size:16px;}
    .reward-table .rank-2{color:#c0c0c0;font-weight:900;font-size:15px;}
    .reward-table .rank-3{color:#cd7f32;font-weight:900;font-size:15px;}
    .reward-table .reward-val{color:#00e676;font-weight:800;}
    .me-badge{display:inline-block;background:rgba(244,196,48,.2);color:#f4c430;font-size:10px;padding:1px 6px;border-radius:10px;margin-left:5px;font-weight:bold;}

    /* ── 요약 칩 ── */
    .summary-chips{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;}
    .summary-chip{
      background:rgba(255,255,255,.04);border:1px solid #2a3242;border-radius:10px;
      padding:8px 14px;font-size:11px;color:#aaa;display:flex;flex-direction:column;gap:2px;
    }
    .summary-chip .chip-val{font-size:16px;font-weight:800;color:#fff;}
    .summary-chip.chip-total-reward .chip-val{color:#00e676;}
    .summary-chip.chip-members .chip-val{color:#f4c430;}
    .summary-chip.chip-confirmed-by .chip-val{color:#80d8ff;}

    /* ── 빈 상태 ── */
    .empty-state{text-align:center;padding:60px 20px;color:#555;}
    .empty-state .empty-icon{font-size:48px;margin-bottom:14px;}
    .empty-state p{font-size:14px;margin:5px 0;line-height:1.7;}

    /* ── 로딩 스켈레톤 ── */
    .skeleton-card{background:#1c1f2a;border:1px solid #2a3242;border-radius:14px;padding:24px;margin-bottom:20px;}

    /* ── 모바일 ── */
    @media(max-width:600px){
      .main-content{padding:16px;}
      .week-nav{padding:10px 12px;gap:10px;}
      .week-nav-label{font-size:14px;min-width:100px;}
      .week-nav-btn{padding:7px 12px;font-size:12px;}
      .reward-table th,.reward-table td{padding:8px 6px;font-size:11px;}
      .history-card{padding:16px;}
    }

    /* ── 프로필 변경 버튼 ── */
    .profile-change-btn{display:block;width:100%;margin:6px 0 4px;padding:5px 0;background:rgba(244,196,48,.12);color:#f4c430;border:1px solid rgba(244,196,48,.35);border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;text-align:center;transition:background .15s;}
    .profile-change-btn:hover{background:rgba(244,196,48,.22);}
  </style>
</head>
<body>

<div id="loadingOverlay" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#0f1015;z-index:9999;display:flex;justify-content:center;align-items:center;color:#f4c430;font-size:1.2rem;font-weight:bold;">ROIDER GUILD Loading...</div>

<header>
  <div class="header-left">
    <button class="menu-trigger" onclick="toggleNav(true)">☰</button>
    <img src="assets/Phoenix_header.jpg" alt="Phoenix Guild" class="header-banner-center" onclick="location.href='main.html'">
  </div>
  <div class="header-right user-box">
    <button class="header-btn" id="langBtn" onclick="handleLangChange()" style="background:rgba(255,255,255,.05);border:1px solid #444;color:#ccc;padding:5px 10px;border-radius:20px;font-size:11px;cursor:pointer;">🌐 KO</button>
  </div>
</header>

<div class="overlay" id="overlay" onclick="toggleNav(false)"></div>

<div class="app-container">
  <nav id="sideNav" class="side-nav">
    <div class="sidebar-user-info">
      <button class="close-nav" onclick="toggleNav(false)">×</button>
      <img id="userPhoto" src="" alt="profile"/>
      <button class="profile-change-btn" onclick="location.href='profile_select.html'" data-i18n="btn_profile_change">✎ 프로필 변경</button>
      <div class="user-name-box">
        <span id="userName" class="u-name">...</span>
        <span id="userBadge" class="role-badge" style="display:none;"></span>
      </div>
      <button class="logout-btn" onclick="logout()" data-i18n="menu_logout">로그아웃</button>
    </div>

    <div class="nav-container">
      <a href="main.html" class="nav-link" data-i18n="menu_home">홈</a>
      <a href="notice.html" class="nav-link" data-i18n="menu_notice">공지사항</a>

      <!-- 주간 컨텐츠 기록부 폴더 -->
      <div class="nav-folder">
        <div class="nav-folder-header open" id="navFolderWeekly">
          <span class="nav-folder-title" data-i18n="weekly_folder">📋 주간 컨텐츠 기록부</span>
          <span class="nav-folder-arrow">▶</span>
        </div>
        <div class="nav-folder-children open" id="navFolderWeeklyChildren">
          <a href="attendance.html" class="nav-sub-link" data-i18n="menu_calendar">📅 주간 출석부</a>
          <a href="weekly.html" class="nav-sub-link" data-i18n="menu_weekly">💰 주간 결산</a>
          <a href="history.html" class="nav-sub-link active" data-i18n="menu_history">📜 결산 내역</a>
        </div>
      </div>

      <a href="members.html" class="nav-link" data-i18n="menu_members">길드원 목록</a>
      <a href="admin.html" class="nav-link" id="navAdminMenu" style="display:none;" data-i18n="menu_admin">권한 관리</a>
    </div>

    <script>
    (function(){
      var FOLDER_KEY = 'roider_nav_weekly_open';
      var header   = document.getElementById('navFolderWeekly');
      var children = document.getElementById('navFolderWeeklyChildren');
      if (!header || !children) return;
      var path = window.location.pathname;
      var isInFolder = path.includes('attendance.html') || path.includes('weekly.html') || path.includes('history.html');
      var hasActive  = children.querySelector('.nav-sub-link.active');
      var saved      = localStorage.getItem(FOLDER_KEY);
      var shouldOpen = isInFolder || !!hasActive || saved === '1';
      function setOpen(open){
        header.classList.toggle('open', open);
        children.classList.toggle('open', open);
        localStorage.setItem(FOLDER_KEY, open ? '1' : '0');
      }
      setOpen(shouldOpen);
      header.addEventListener('click', function(e){
        e.stopPropagation();
        setOpen(!header.classList.contains('open'));
      });
    })();
    </script>
  </nav>

  <main class="main-content">
    <div class="wrap">
      <div class="page-title">
        <h2 data-i18n="menu_history">📜 결산 내역</h2>
      </div>
      <p class="page-desc" data-i18n="history_desc">주간 결산이 확정된 내역을 확인할 수 있습니다.</p>

      <!-- 주차 네비게이션 -->
      <div class="week-nav" id="weekNav">
        <button class="week-nav-btn" id="btnPrev" onclick="navigate(-1)" disabled>
          ← <span data-i18n="history_prev">이전</span>
        </button>
        <div class="week-nav-label" id="weekNavLabel">
          <span id="weekNavText">--월 --주차</span>
          <span class="week-sub" id="weekNavDate">로딩 중...</span>
        </div>
        <button class="week-nav-btn" id="btnNext" onclick="navigate(1)" disabled>
          <span data-i18n="history_next">다음</span> →
        </button>
      </div>

      <!-- 결산 내용 -->
      <div id="historyContent">
        <!-- 스켈레톤 -->
        <div class="skeleton-card">
          <div class="skeleton skeleton-line" style="width:180px;height:20px;margin-bottom:16px;"></div>
          <div class="skeleton skeleton-line" style="width:100%;height:14px;margin-bottom:8px;"></div>
          <div class="skeleton skeleton-line" style="width:100%;height:14px;margin-bottom:8px;"></div>
          <div class="skeleton skeleton-line" style="width:80%;height:14px;"></div>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
  let myNickname = '';
  let allRecords = []; // Firestore에서 가져온 전체 결산 기록 배열 (날짜 내림차순)
  let currentIndex = 0; // 현재 보고 있는 인덱스 (0 = 최신)

  function toggleNav(open) {
    const nav = document.getElementById('sideNav');
    const ov  = document.getElementById('overlay');
    nav.classList.toggle('active', open);
    ov.classList.toggle('active', open);
  }

  // ── 인증 ──
  auth.onAuthStateChanged(async user => {
    if (!user) return location.replace('login.html');
    try {
      const snap = await db.collection('users').doc(user.uid).get();
      const data = snap.data();
      if (!data) return location.replace('login.html');

      document.getElementById('loadingOverlay').style.display = 'none';
      myNickname = data.nickname || '';
      document.getElementById('userName').textContent = myNickname;

      const role = (data.role || 'member').toLowerCase();
      const photoEl = document.getElementById('userPhoto');
      photoEl.src = data.customPhotoURL || user.photoURL ||
        `https://ui-avatars.com/api/?name=${encodeURIComponent(myNickname)}&background=2a3242&color=f4c430&bold=true`;
      photoEl.className = `border-${role}`;

      const badge = document.getElementById('userBadge');
      badge.style.display = 'inline-block';
      badge.textContent = role.toUpperCase();
      badge.className = `role-badge role-${role.toUpperCase()}`;

      if (role === 'admin' || role === 'manager') {
        document.getElementById('navAdminMenu').style.display = 'block';
      }

      if (window.applyLanguage) window.applyLanguage();
      updateLangBtn();
      await loadHistory();
    } catch(e) {
      console.error(e);
    }
  });

  // ── 히스토리 로드 ──
  async function loadHistory() {
    try {
      const snap = await db.collection('weekly_results')
        .orderBy('createdAt', 'desc')
        .get();

      allRecords = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));

      if (allRecords.length === 0) {
        showEmpty();
        return;
      }

      currentIndex = 0;
      renderRecord(currentIndex);
    } catch(e) {
      console.error('히스토리 로드 오류:', e);
      document.getElementById('historyContent').innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">⚠️</div>
          <p>데이터를 불러오는 중 오류가 발생했습니다.</p>
        </div>`;
    }
  }

  // ── 네비게이션 (이전/다음) ──
  function navigate(dir) {
    const newIdx = currentIndex + dir;
    if (newIdx < 0 || newIdx >= allRecords.length) return;
    currentIndex = newIdx;
    renderRecord(currentIndex);
  }

  // ── O월 O주차 계산 ──
  function getWeekLabel(mondayStr) {
    // mondayStr 형식: "2026-05-04" (월요일 날짜)
    const lang = localStorage.getItem('roider_lang') || 'ko';
    const date = new Date(mondayStr + 'T00:00:00Z');
    const month = date.getUTCMonth() + 1;
    const day   = date.getUTCDate();

    // 해당 월의 첫 번째 월요일 기준으로 주차 계산
    const firstDay = new Date(Date.UTC(date.getUTCFullYear(), date.getUTCMonth(), 1));
    const firstMonday = new Date(firstDay);
    const fd = firstDay.getUTCDay(); // 0=일,1=월,...
    const offset = fd === 0 ? 1 : (fd === 1 ? 0 : 8 - fd);
    firstMonday.setUTCDate(1 + offset);

    let weekNum = 1;
    let cur = new Date(firstMonday);
    while (cur <= date) {
      if (cur.getTime() === date.getTime()) break;
      cur.setUTCDate(cur.getUTCDate() + 7);
      weekNum++;
    }
    // 날짜가 첫 번째 월요일 이전이면 이전 달 마지막 주
    if (date < firstMonday) {
      weekNum = getPrevMonthWeekCount(date);
      const prevMonth = month - 1 === 0 ? 12 : month - 1;
      if (lang === 'ko') return `${prevMonth}월 ${weekNum}주차`;
      return `Week ${weekNum} of ${getMonthName(prevMonth - 1, lang)}`;
    }

    if (lang === 'ko') return `${month}월 ${weekNum}주차`;
    const weekLabels = { fr: `Semaine ${weekNum} de`, de: `KW ${weekNum} im`, it: `Settimana ${weekNum} di`, es: `Semana ${weekNum} de`, pt: `Semana ${weekNum} de`, 'zh-CN': `${month}月第${weekNum}周`, 'zh-TW': `${month}月第${weekNum}週`, ja: `${month}月第${weekNum}週` };
    if (weekLabels[lang]) return weekLabels[lang];
    return `Week ${weekNum} of ${getMonthName(month - 1, lang)}`;
  }

  function getMonthName(idx, lang) {
    const en = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    return en[idx] || '';
  }

  function getPrevMonthWeekCount(date) {
    // 이전 달의 주차 수 계산 (최대 5주)
    return 5;
  }

  // ── 날짜 범위 표시 (월요일~일요일) ──
  function getWeekRange(mondayStr) {
    const monday = new Date(mondayStr + 'T00:00:00Z');
    const sunday = new Date(monday);
    sunday.setUTCDate(monday.getUTCDate() + 6);
    const fmt = d => `${d.getUTCFullYear()}.${String(d.getUTCMonth()+1).padStart(2,'0')}.${String(d.getUTCDate()).padStart(2,'0')}`;
    return `${fmt(monday)} ~ ${fmt(sunday)}`;
  }

  // ── 확정 일시 표시 ──
  function getFinalizedAt(rec) {
    if (!rec.finalizedAt) return '';
    const ts = rec.finalizedAt.seconds ? new Date(rec.finalizedAt.seconds * 1000) : new Date(rec.finalizedAt);
    return ts.toLocaleString('ko-KR', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
  }

  // ── 레코드 렌더 ──
  function renderRecord(idx) {
    const lang = localStorage.getItem('roider_lang') || 'ko';
    const rec  = allRecords[idx];
    if (!rec) { showEmpty(); return; }

    // 네비게이션 버튼 상태
    document.getElementById('btnPrev').disabled = (idx >= allRecords.length - 1);
    document.getElementById('btnNext').disabled = (idx <= 0);

    // 주차 레이블
    const weekLabel = getWeekLabel(rec.id);
    document.getElementById('weekNavText').textContent = weekLabel;
    document.getElementById('weekNavDate').textContent = getWeekRange(rec.id);

    // 결산 데이터 파싱
    const result = rec.result || {};       // { 닉네임: 박스수 }
    const rawData = rec.rawData || [];     // 상세 점수 배열
    const totalReward = rec.totalReward || 0;
    const confirmedBy = rec.confirmedBy || '-';
    const finalizedAt = getFinalizedAt(rec);

    // rawData 기반 정렬 (totalAvg 내림차순), 없으면 result 기반
    let rows = [];
    if (rawData && rawData.length > 0) {
      rows = [...rawData].sort((a, b) => (b.totalAvg || 0) - (a.totalAvg || 0));
    } else {
      // result 객체만 있는 경우
      rows = Object.entries(result)
        .map(([nickname, boxes]) => ({ nickname, boxes }))
        .sort((a, b) => b.boxes - a.boxes);
    }

    // 번역 키
    const T = (key, fb) => (window.i18n?.[lang]?.[key]) || fb;

    // 요약 칩
    const memberCount = rows.length;
    const summaryHtml = `
      <div class="summary-chips">
        <div class="summary-chip chip-total-reward">
          <span class="chip-val">${totalReward > 0 ? totalReward.toLocaleString() + T('history_box_unit', '개') : '-'}</span>
          <span>${T('history_total_reward', '총 보상량')}</span>
        </div>
        <div class="summary-chip chip-members">
          <span class="chip-val">${memberCount}${T('history_people_unit', '명')}</span>
          <span>${T('history_participants', '참여 인원')}</span>
        </div>
        <div class="summary-chip chip-confirmed-by">
          <span class="chip-val">${confirmedBy}</span>
          <span>${T('history_confirmed_by', '확정자')}</span>
        </div>
      </div>`;

    // 테이블 행
    let tbodyHtml = '';
    rows.forEach((row, i) => {
      const nickname = row.nickname || '';
      const boxes    = result[nickname] !== undefined ? result[nickname] : (row.boxes || 0);
      const totalAvg = row.totalAvg !== undefined ? row.totalAvg.toFixed(1) : '-';
      const ratio    = row.ratio !== undefined
        ? (row.ratio * 100).toFixed(1) + '%'
        : (totalReward > 0 && boxes > 0 ? ((boxes / totalReward) * 100).toFixed(1) + '%' : '-');
      const isMe     = nickname === myNickname;
      const rankNum  = i + 1;
      let rankDisplay = rankNum;
      let rankClass   = '';
      if (rankNum === 1) { rankDisplay = '🥇'; rankClass = 'rank-1'; }
      else if (rankNum === 2) { rankDisplay = '🥈'; rankClass = 'rank-2'; }
      else if (rankNum === 3) { rankDisplay = '🥉'; rankClass = 'rank-3'; }

      const meBadge = isMe ? `<span class="me-badge">${T('weekly_me_badge','나')}</span>` : '';

      tbodyHtml += `
        <tr class="${isMe ? 'my-row' : ''}">
          <td class="${rankClass}">${rankDisplay}</td>
          <td style="text-align:left;padding-left:12px;">${escHtml(nickname)}${meBadge}</td>
          ${rawData.length > 0 ? `<td>${totalAvg}</td><td>${ratio}</td>` : ''}
          <td class="reward-val">${boxes > 0 ? boxes.toLocaleString() + T('history_box_unit','개') : '-'}</td>
        </tr>`;
    });

    const showDetailCols = rawData.length > 0;
    const tableHtml = `
      <div class="reward-table-wrap">
        <table class="reward-table">
          <thead>
            <tr>
              <th style="width:50px;">${T('col_rank','순위')}</th>
              <th style="text-align:left;padding-left:12px;">${T('col_nickname','닉네임')}</th>
              ${showDetailCols ? `<th>${T('col_total_avg','합산 평균점수')}</th><th>${T('col_ratio','기여도')}</th>` : ''}
              <th style="color:#00e676;">${T('col_est_reward','분배량')}</th>
            </tr>
          </thead>
          <tbody>${tbodyHtml}</tbody>
        </table>
      </div>`;

    const cardHtml = `
      <div class="history-card">
        <div class="history-card-header">
          <div class="history-card-title">📊 ${weekLabel} ${T('history_title_suffix','결산 내역')}</div>
          <div class="history-card-meta">
            ${finalizedAt ? `<span>🕐 ${finalizedAt}</span>` : ''}
            <span>📅 ${getWeekRange(rec.id)}</span>
          </div>
        </div>
        ${summaryHtml}
        ${rows.length > 0 ? tableHtml : `<div class="empty-state"><div class="empty-icon">📭</div><p>${T('history_no_data','이 주차에는 기록된 분배 데이터가 없습니다.')}</p></div>`}
      </div>`;

    document.getElementById('historyContent').innerHTML = cardHtml;
  }

  function showEmpty() {
    const lang = localStorage.getItem('roider_lang') || 'ko';
    document.getElementById('weekNavText').textContent = '--';
    document.getElementById('weekNavDate').textContent = '';
    document.getElementById('btnPrev').disabled = true;
    document.getElementById('btnNext').disabled = true;
    document.getElementById('historyContent').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📭</div>
        <p>${lang==='ko' ? '아직 확정된 결산 내역이 없습니다.' : 'No finalized settlement records yet.'}</p>
        <p style="font-size:11px;margin-top:8px;">${lang==='ko' ? '주간 결산 페이지에서 기록을 확정하면 자동으로 여기에 기록됩니다.' : 'Records appear here after finalization on the Weekly Settlement page.'}</p>
      </div>`;
  }

  function escHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── 언어 ──
  function handleLangChange() {
    const langs = ['ko','en','fr','de','it','es','zh-CN','zh-TW','ja','pt'];
    const cur   = localStorage.getItem('roider_lang') || 'ko';
    const idx   = langs.indexOf(cur);
    const next  = langs[(idx + 1) % langs.length];
    localStorage.setItem('roider_lang', next);
    if (window.currentLang !== undefined) window.currentLang = next;
    updateLangBtn();
    if (window.applyLanguage) window.applyLanguage();
    if (allRecords.length > 0) renderRecord(currentIndex);
  }

  function updateLangBtn() {
    const lang = localStorage.getItem('roider_lang') || 'ko';
    const labels = { ko:'🌐 KO', en:'🌐 EN', fr:'🌐 FR', de:'🌐 DE', it:'🌐 IT', es:'🌐 ES', 'zh-CN':'🌐 CN', 'zh-TW':'🌐 TW', ja:'🌐 JA', pt:'🌐 PT' };
    const btn = document.getElementById('langBtn');
    if (btn) btn.textContent = labels[lang] || '🌐';
  }

  function logout() { auth.signOut().then(() => location.replace('login.html')); }
</script>
</body>
</html>
