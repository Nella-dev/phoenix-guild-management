<!DOCTYPE html>
<html lang="ko">
<head>
  <!-- DNS Prefetch & Preconnect for performance -->
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://identitytoolkit.googleapis.com" crossorigin>
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
  <link rel="dns-prefetch" href="https://fonts.googleapis.com">
  <link rel="dns-prefetch" href="https://ui-avatars.com">
  <link rel="dns-prefetch" href="https://discord.com">

  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <title>AFK Journey: Homestead - Login</title>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-functions-compat.js"></script>

  <script src="firebase_key.js"></script>
  <script>window.isLoginPage = true;</script>
  <script src="firebase_config.js"></script>
  <script src="ui_utils.js"></script>
  <!-- Discord OAuth 설정 (배포 시 실제 값으로 교체) -->
  <script src="discord_config.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      background: #0f1015;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 16px;
    }

    /* ── 카드 ── */
    .card {
      background: #1c1f2a;
      padding: 40px 36px;
      border-radius: 20px;
      text-align: center;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
      border: 1px solid #2a3242;
    }

    .guild-icon {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      margin-bottom: 16px;
      border: 2px solid #f4c43044;
    }

    h2 { margin: 0 0 6px; color: #f4c430; font-size: 22px; font-weight: 800; }
    .subtitle { color: #8892b0; margin: 0 0 32px; font-size: 14px; }

    /* ── 구분선 ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 20px 0;
      color: #3a4255;
      font-size: 12px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #2a3242;
    }

    /* ── 로그인 버튼 공통 ── */
    .login-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 13px 20px;
      border-radius: 12px;
      border: none;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s, filter 0.15s;
      letter-spacing: 0.2px;
    }
    .login-btn:hover  { transform: translateY(-2px); }
    .login-btn:active { transform: scale(0.97); }
    .login-btn:disabled { opacity: 0.55; pointer-events: none; filter: grayscale(0.4); }

    /* Google */
    .btn-google {
      background: #fff;
      color: #3c4043;
      box-shadow: 0 1px 6px rgba(0,0,0,0.35);
    }
    .btn-google svg { flex-shrink: 0; }

    /* Discord */
    .btn-discord {
      background: #5865F2;
      color: #fff;
      box-shadow: 0 4px 20px rgba(88,101,242,0.35);
    }
    .btn-discord:hover { background: #4752c4; }

    /* 로딩 상태 */
    #loginLoading {
      display: none;
      margin-top: 18px;
      color: #8892b0;
      font-size: 13px;
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:.7} 50%{opacity:1} }

    /* 안내 텍스트 */
    .hint {
      margin-top: 24px;
      font-size: 12px;
      color: #4a5568;
      line-height: 1.6;
    }

    /* 텍스트 줄바꿈 */
    .notice-card, .user-card, .info-text, td, th { word-break: keep-all; overflow-wrap: break-word; }
  </style>
</head>
<body>
  <div class="card">
    <!-- 길드 아이콘 -->
    <img src="assets/icon-192.png" onerror="this.style.display='none'" class="guild-icon" alt="Phoenix Guild">

    <h2>AFK Journey: Homestead</h2>
    <p class="subtitle">Phoenix Guild Management</p>

    <!-- ① Google 로그인 -->
    <button class="login-btn btn-google" id="btnGoogle" onclick="loginGoogle()">
      <!-- Google G 로고 SVG -->
      <svg width="20" height="20" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      Google로 로그인
    </button>

    <div class="divider">또는</div>

    <!-- ② Discord 로그인 -->
    <button class="login-btn btn-discord" id="btnDiscord" onclick="loginDiscord()">
      <!-- Discord 로고 SVG -->
      <svg width="22" height="16" viewBox="0 0 71 55" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M60.1 4.9A58.6 58.6 0 0 0 45.5 0c-.6 1.2-1.4 2.7-1.9 4a54 54 0 0 0-16.3 0C26.8 2.7 26 1.2 25.3 0A58.5 58.5 0 0 0 10.7 5C1.5 18.6-.9 31.9.3 45a59 59 0 0 0 18 9.1c1.5-2 2.8-4.1 3.9-6.4a38.3 38.3 0 0 1-6.1-3c.5-.4 1-.7 1.5-1.1a42 42 0 0 0 35.8 0c.5.4 1 .7 1.5 1.1a38.3 38.3 0 0 1-6.1 3c1.1 2.3 2.4 4.4 3.9 6.4A58.8 58.8 0 0 0 70.7 45C72.1 30 68.3 16.8 60.1 4.9ZM23.7 36.8c-3.5 0-6.4-3.2-6.4-7.1 0-3.9 2.8-7.1 6.4-7.1 3.5 0 6.4 3.2 6.3 7.1 0 3.9-2.8 7.1-6.3 7.1Zm23.6 0c-3.5 0-6.4-3.2-6.4-7.1 0-3.9 2.8-7.1 6.4-7.1 3.5 0 6.4 3.2 6.3 7.1 0 3.9-2.8 7.1-6.3 7.1Z" fill="white"/>
      </svg>
      Discord로 로그인
    </button>

    <div id="loginLoading">⏳ 로그인 처리 중...</div>

    <p class="hint">
      Discord 로그인 시 서버 닉네임이<br>자동으로 인게임 닉네임 후보로 제안됩니다.
    </p>
  </div>

  <script>
  // ══════════════════════════════════════════════════
  //  Google 로그인 (기존 방식 유지)
  // ══════════════════════════════════════════════════
  async function loginGoogle() {
    const btn = document.getElementById('btnGoogle');
    setLoading(btn, true);

    const provider = new firebase.auth.GoogleAuthProvider();
    provider.addScope('email');
    provider.addScope('profile');

    try {
      console.log('[Login] Google signInWithPopup 시도...');
      await auth.signInWithPopup(provider);
      // 성공 → firebase_config.js onAuthStateChanged가 페이지 이동 처리
    } catch (error) {
      console.error('[Login] Google Error:', error.code, error.message);
      setLoading(btn, false);

      if (error.code === 'auth/popup-blocked') {
        showToast('팝업이 차단되었습니다. 잠시 후 리다이렉트로 재시도합니다.', 'warning');
        setTimeout(async () => {
          try { await auth.signInWithRedirect(provider); }
          catch(e) { showToast('로그인 실패. 잠시 후 다시 시도해 주세요.', 'error'); }
        }, 1500);
      } else if (error.code !== 'auth/popup-closed-by-user' && error.code !== 'auth/cancelled-popup-request') {
        showToast('로그인 오류: ' + (error.message || error.code), 'error');
      }
    }
  }

  // ══════════════════════════════════════════════════
  //  Discord 로그인
  //  흐름: 팝업 열기 → discord_callback.html에서 code 수신
  //        → discordExchangeToken CF 호출 → signInWithCustomToken
  // ══════════════════════════════════════════════════
  let _discordPopup = null;
  let _discordMsgHandler = null;

  function loginDiscord() {
    // discord_config.js 에서 DISCORD_CLIENT_ID, DISCORD_REDIRECT_URI 참조
    const clientId   = window.DISCORD_CLIENT_ID;
    const redirectUri = window.DISCORD_REDIRECT_URI;

    if (!clientId || clientId === 'YOUR_DISCORD_CLIENT_ID') {
      showToast('Discord 앱 설정이 필요합니다. 관리자에게 문의하세요.', 'warning');
      return;
    }

    const btn = document.getElementById('btnDiscord');
    setLoading(btn, true);

    // CSRF 방지용 state 값 생성
    const state = Math.random().toString(36).slice(2);
    sessionStorage.setItem('discord_oauth_state', state);

    // Discord OAuth2 인증 URL
    const scope = 'identify guilds.members.read';
    const authUrl = `https://discord.com/oauth2/authorize` +
      `?client_id=${encodeURIComponent(clientId)}` +
      `&redirect_uri=${encodeURIComponent(redirectUri)}` +
      `&response_type=code` +
      `&scope=${encodeURIComponent(scope)}` +
      `&state=${state}` +
      `&prompt=none`;   // 이미 인증된 경우 재확인 생략

    // ── 팝업 열기 ──
    const w = 480, h = 700;
    const left = Math.round(window.screenX + (window.outerWidth  - w) / 2);
    const top  = Math.round(window.screenY + (window.outerHeight - h) / 2);
    _discordPopup = window.open(authUrl, 'discord_oauth',
      `width=${w},height=${h},left=${left},top=${top},toolbar=no,menubar=no,scrollbars=yes`);

    if (!_discordPopup) {
      // 팝업 차단 → redirect 폴백
      showToast('팝업이 차단되었습니다. 새 탭으로 이동합니다.', 'warning');
      setLoading(btn, false);
      sessionStorage.setItem('discord_redirect_pending', '1');
      location.href = authUrl.replace('_discordPopup', '_blank');
      return;
    }

    // ── 팝업 → 부모창 메시지 수신 ──
    if (_discordMsgHandler) window.removeEventListener('message', _discordMsgHandler);
    _discordMsgHandler = async (evt) => {
      // 보안: 출처 확인 (같은 origin만 허용)
      if (evt.origin !== location.origin) return;
      if (!evt.data || evt.data.type !== 'DISCORD_OAUTH_CODE') return;

      window.removeEventListener('message', _discordMsgHandler);
      _discordMsgHandler = null;

      const { code, state: retState, error: oauthError } = evt.data;

      if (oauthError) {
        showToast('Discord 인증이 취소되었습니다.', 'warning');
        setLoading(btn, false);
        return;
      }

      // CSRF state 검증
      const savedState = sessionStorage.getItem('discord_oauth_state');
      sessionStorage.removeItem('discord_oauth_state');
      if (retState !== savedState) {
        showToast('보안 오류가 발생했습니다. 다시 시도해 주세요.', 'error');
        setLoading(btn, false);
        return;
      }

      await handleDiscordCode(code, btn);
    };
    window.addEventListener('message', _discordMsgHandler);

    // 팝업 닫힘 감지 (사용자가 직접 닫은 경우)
    const pollTimer = setInterval(() => {
      if (_discordPopup && _discordPopup.closed) {
        clearInterval(pollTimer);
        if (_discordMsgHandler) {
          window.removeEventListener('message', _discordMsgHandler);
          _discordMsgHandler = null;
        }
        setLoading(btn, false);
      }
    }, 500);
  }

  // ── Discord code → Firebase 로그인 처리 ──────────────────────────────
  async function handleDiscordCode(code, btn) {
    document.getElementById('loginLoading').textContent = '⏳ Discord 인증 처리 중...';

    try {
      // Cloud Function 호출: discordExchangeToken
      // GitHub Pages 환경에서는 리전을 명시해야 함 (asia-northeast3 = 서울)
      const fn = firebase.app().functions('asia-northeast3').httpsCallable('discordExchangeToken');
      const result = await fn({ code });

      const { customToken, discordUser } = result.data;

      document.getElementById('loginLoading').textContent = '⏳ Firebase 로그인 중...';

      // Firebase Custom Token으로 로그인
      await auth.signInWithCustomToken(customToken);

      // Discord 정보를 sessionStorage에 임시 저장 (nickname.html에서 참조)
      sessionStorage.setItem('discord_user', JSON.stringify(discordUser));

      // firebase_config.js onAuthStateChanged가 페이지 이동 처리
      console.log('[Discord] 로그인 성공:', discordUser.username, '| 서버닉:', discordUser.serverNick);

    } catch (e) {
      console.error('[Discord] handleDiscordCode error:', e);
      console.error('[Discord] error details:', JSON.stringify({
        code: e.code, message: e.message, details: e.details
      }));
      setLoading(btn, false);
      // 오류 코드별 친절한 메시지
      let msg = e.message || e.code || '알 수 없는 오류';
      if (e.code === 'functions/internal') {
        msg = 'Discord 서버 연결 오류입니다. 잠시 후 다시 시도해 주세요.';
      } else if (e.code === 'functions/failed-precondition') {
        msg = 'Discord 앱 설정이 완료되지 않았습니다. 관리자에게 문의하세요.';
      } else if (e.code === 'functions/unauthenticated') {
        msg = 'Discord 인증에 실패했습니다. 다시 시도해 주세요.';
      }
      showToast('❌ Discord 로그인 실패: ' + msg, 'error');
    }
  }

  // ── 버튼 로딩 상태 토글 ────────────────────────────────────────────────
  function setLoading(btn, on) {
    const loadingEl = document.getElementById('loginLoading');
    if (on) {
      btn.disabled = true;
      loadingEl.style.display = 'block';
      loadingEl.textContent   = '⏳ 로그인 처리 중...';
    } else {
      btn.disabled = false;
      loadingEl.style.display = 'none';
    }
  }

  // ── redirect 방식 콜백 처리 (팝업 차단 시 discord_callback → login.html으로 돌아옴) ──
  window.addEventListener('DOMContentLoaded', async () => {
    const urlParams = new URLSearchParams(location.search);
    // discord_callback.html이 discord_code / discord_state 파라미터로 넘겨줌
    const code  = urlParams.get('discord_code');
    const state = urlParams.get('discord_state');
    const err   = urlParams.get('discord_error');

    if (!code && !err) return;  // Discord 콜백이 아님

    history.replaceState({}, '', location.pathname); // URL에서 파라미터 제거
    const btn = document.getElementById('btnDiscord');
    setLoading(btn, true);

    if (err) {
      const msg = err === 'access_denied'
        ? 'Discord 로그인이 취소되었습니다.'
        : 'Discord 인증 오류: ' + err;
      showToast(msg, 'warning');
      setLoading(btn, false);
      return;
    }

    const savedState = sessionStorage.getItem('discord_oauth_state');
    sessionStorage.removeItem('discord_oauth_state');
    if (state && savedState && state !== savedState) {
      showToast('보안 오류가 발생했습니다. 다시 시도해 주세요.', 'error');
      setLoading(btn, false);
      return;
    }

    await handleDiscordCode(code, btn);
  });
  </script>
</body>
</html>
