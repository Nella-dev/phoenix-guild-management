<!DOCTYPE html>
<html lang="en">
<head>
  <!-- DNS Prefetch & Preconnect for performance -->
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://identitytoolkit.googleapis.com" crossorigin>
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
  <link rel="dns-prefetch" href="https://fonts.googleapis.com">
  <link rel="dns-prefetch" href="https://ui-avatars.com">
  <link rel="dns-prefetch" href="https://discord.com">

  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <title>AFK Journey: Homestead - Login</title>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-functions-compat.js"></script>

  <script src="firebase_key.js"></script>
  <script>window.isLoginPage = true;</script>
  <script src="firebase_config.js"></script>
  <script src="ui_utils.js"></script>
  <!-- Discord OAuth config -->
  <script src="discord_config.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      background: #0f1015;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 16px;
    }

    /* ── Card ── */
    .card {
      background: #1c1f2a;
      padding: 40px 36px;
      border-radius: 20px;
      text-align: center;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
      border: 1px solid #2a3242;
    }

    .guild-icon {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      margin-bottom: 16px;
      border: 2px solid #f4c43044;
    }

    h2 { margin: 0 0 6px; color: #f4c430; font-size: 22px; font-weight: 800; }
    .subtitle { color: #8892b0; margin: 0 0 32px; font-size: 14px; }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 20px 0;
      color: #3a4255;
      font-size: 12px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #2a3242;
    }

    /* ── Login buttons ── */
    .login-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 13px 20px;
      border-radius: 12px;
      border: none;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s, filter 0.15s;
      letter-spacing: 0.2px;
    }
    .login-btn:hover  { transform: translateY(-2px); }
    .login-btn:active { transform: scale(0.97); }
    .login-btn:disabled { opacity: 0.55; pointer-events: none; filter: grayscale(0.4); }

    /* Google */
    .btn-google {
      background: #fff;
      color: #3c4043;
      box-shadow: 0 1px 6px rgba(0,0,0,0.35);
    }
    .btn-google svg { flex-shrink: 0; }

    /* Discord */
    .btn-discord {
      background: #5865F2;
      color: #fff;
      box-shadow: 0 4px 20px rgba(88,101,242,0.35);
    }
    .btn-discord:hover { background: #4752c4; }

    /* Loading state */
    #loginLoading {
      display: none;
      margin-top: 18px;
      color: #8892b0;
      font-size: 13px;
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:.7} 50%{opacity:1} }

    /* Hint text */
    .hint {
      margin-top: 24px;
      font-size: 12px;
      color: #4a5568;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="card">
    <!-- Guild icon -->
    <img src="assets/icon-192.png" onerror="this.style.display='none'" class="guild-icon" alt="Phoenix Guild">

    <h2>AFK Journey: Homestead</h2>
    <p class="subtitle">Phoenix Guild Management</p>

    <!-- ① Google Sign-In -->
    <button class="login-btn btn-google" id="btnGoogle" onclick="loginGoogle()">
      <!-- Google G logo SVG -->
      <svg width="20" height="20" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      Sign in with Google
    </button>

    <div class="divider">or</div>

    <!-- ② Discord Sign-In -->
    <button class="login-btn btn-discord" id="btnDiscord" onclick="loginDiscord()">
      <!-- Discord logo SVG -->
      <svg width="22" height="16" viewBox="0 0 71 55" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M60.1 4.9A58.6 58.6 0 0 0 45.5 0c-.6 1.2-1.4 2.7-1.9 4a54 54 0 0 0-16.3 0C26.8 2.7 26 1.2 25.3 0A58.5 58.5 0 0 0 10.7 5C1.5 18.6-.9 31.9.3 45a59 59 0 0 0 18 9.1c1.5-2 2.8-4.1 3.9-6.4a38.3 38.3 0 0 1-6.1-3c.5-.4 1-.7 1.5-1.1a42 42 0 0 0 35.8 0c.5.4 1 .7 1.5 1.1a38.3 38.3 0 0 1-6.1 3c1.1 2.3 2.4 4.4 3.9 6.4A58.8 58.8 0 0 0 70.7 45C72.1 30 68.3 16.8 60.1 4.9ZM23.7 36.8c-3.5 0-6.4-3.2-6.4-7.1 0-3.9 2.8-7.1 6.4-7.1 3.5 0 6.4 3.2 6.3 7.1 0 3.9-2.8 7.1-6.3 7.1Zm23.6 0c-3.5 0-6.4-3.2-6.4-7.1 0-3.9 2.8-7.1 6.4-7.1 3.5 0 6.4 3.2 6.3 7.1 0 3.9-2.8 7.1-6.3 7.1Z" fill="white"/>
      </svg>
      Sign in with Discord
    </button>

    <div id="loginLoading">⏳ Signing in...</div>

    <p class="hint">
      Discord login automatically suggests your<br>server nickname as your in-game name.
    </p>
  </div>

  <script>
  // ══════════════════════════════════════════════════
  //  Google Sign-In
  // ══════════════════════════════════════════════════
  async function loginGoogle() {
    const btn = document.getElementById('btnGoogle');
    setLoading(btn, true);

    const provider = new firebase.auth.GoogleAuthProvider();
    provider.addScope('email');
    provider.addScope('profile');

    try {
      console.log('[Login] Google signInWithPopup...');
      await auth.signInWithPopup(provider);
      // Success → firebase_config.js onAuthStateChanged handles redirect
    } catch (error) {
      console.error('[Login] Google Error:', error.code, error.message);
      setLoading(btn, false);

      if (error.code === 'auth/popup-blocked') {
        showToast('Popup blocked. Retrying with redirect...', 'warning');
        setTimeout(async () => {
          try { await auth.signInWithRedirect(provider); }
          catch(e) { showToast('Sign-in failed. Please try again.', 'error'); }
        }, 1500);
      } else if (error.code !== 'auth/popup-closed-by-user' && error.code !== 'auth/cancelled-popup-request') {
        showToast('Sign-in error: ' + (error.message || error.code), 'error');
      }
    }
  }

  // ══════════════════════════════════════════════════
  //  Discord Sign-In
  //  Flow: open popup → discord_callback.html sends code
  //        → discordExchangeToken CF → signInWithCustomToken
  // ══════════════════════════════════════════════════
  let _discordPopup = null;
  let _discordMsgHandler = null;

  function loginDiscord() {
    const clientId    = window.DISCORD_CLIENT_ID;
    const redirectUri = window.DISCORD_REDIRECT_URI;

    if (!clientId || clientId === 'YOUR_DISCORD_CLIENT_ID') {
      showToast('Discord app not configured. Please contact an admin.', 'warning');
      return;
    }

    const btn = document.getElementById('btnDiscord');
    setLoading(btn, true);

    // CSRF state
    const state = Math.random().toString(36).slice(2);
    sessionStorage.setItem('discord_oauth_state', state);

    const scope  = 'identify guilds.members.read';
    const authUrl = `https://discord.com/oauth2/authorize` +
      `?client_id=${encodeURIComponent(clientId)}` +
      `&redirect_uri=${encodeURIComponent(redirectUri)}` +
      `&response_type=code` +
      `&scope=${encodeURIComponent(scope)}` +
      `&state=${state}` +
      `&prompt=none`;

    // ── Open popup ──
    const w = 480, h = 700;
    const left = Math.round(window.screenX + (window.outerWidth  - w) / 2);
    const top  = Math.round(window.screenY + (window.outerHeight - h) / 2);
    _discordPopup = window.open(authUrl, 'discord_oauth',
      `width=${w},height=${h},left=${left},top=${top},toolbar=no,menubar=no,scrollbars=yes`);

    if (!_discordPopup) {
      showToast('Popup blocked. Opening in new tab...', 'warning');
      setLoading(btn, false);
      sessionStorage.setItem('discord_redirect_pending', '1');
      location.href = authUrl.replace('_discordPopup', '_blank');
      return;
    }

    // ── Receive message from popup ──
    if (_discordMsgHandler) window.removeEventListener('message', _discordMsgHandler);
    _discordMsgHandler = async (evt) => {
      if (evt.origin !== location.origin) return;
      if (!evt.data || evt.data.type !== 'DISCORD_OAUTH_CODE') return;

      window.removeEventListener('message', _discordMsgHandler);
      _discordMsgHandler = null;

      const { code, state: retState, error: oauthError } = evt.data;

      if (oauthError) {
        showToast('Discord authorization cancelled.', 'warning');
        setLoading(btn, false);
        return;
      }

      // CSRF state check
      const savedState = sessionStorage.getItem('discord_oauth_state');
      sessionStorage.removeItem('discord_oauth_state');
      if (retState !== savedState) {
        showToast('Security error. Please try again.', 'error');
        setLoading(btn, false);
        return;
      }

      await handleDiscordCode(code, btn);
    };
    window.addEventListener('message', _discordMsgHandler);

    // Detect popup closed by user
    const pollTimer = setInterval(() => {
      if (_discordPopup && _discordPopup.closed) {
        clearInterval(pollTimer);
        if (_discordMsgHandler) {
          window.removeEventListener('message', _discordMsgHandler);
          _discordMsgHandler = null;
        }
        setLoading(btn, false);
      }
    }, 500);
  }

  // ── Discord code → Firebase sign-in ──────────────────────────────
  async function handleDiscordCode(code, btn) {
    document.getElementById('loginLoading').textContent = '⏳ Verifying Discord...';

    try {
      const fn = firebase.app().functions('asia-northeast3').httpsCallable('discordExchangeToken');
      const result = await fn({ code });

      const { customToken, discordUser } = result.data;

      document.getElementById('loginLoading').textContent = '⏳ Signing in to Firebase...';

      await auth.signInWithCustomToken(customToken);

      sessionStorage.setItem('discord_user', JSON.stringify(discordUser));

      console.log('[Discord] Sign-in success:', discordUser.username, '| server nick:', discordUser.serverNick);

    } catch (e) {
      console.error('[Discord] handleDiscordCode error:', e);
      setLoading(btn, false);
      let msg = e.message || e.code || 'Unknown error';
      if (e.code === 'functions/internal') {
        msg = 'Discord server connection error. Please try again.';
      } else if (e.code === 'functions/failed-precondition') {
        msg = 'Discord app not configured. Please contact an admin.';
      } else if (e.code === 'functions/unauthenticated') {
        msg = 'Discord authentication failed. Please try again.';
      }
      showToast('❌ Discord sign-in failed: ' + msg, 'error');
    }
  }

  // ── Button loading toggle ──────────────────────────────────────────
  function setLoading(btn, on) {
    const loadingEl = document.getElementById('loginLoading');
    if (on) {
      btn.disabled = true;
      loadingEl.style.display = 'block';
      loadingEl.textContent   = '⏳ Signing in...';
    } else {
      btn.disabled = false;
      loadingEl.style.display = 'none';
    }
  }

  // ── Redirect fallback (popup blocked → discord_callback → login.html) ──
  window.addEventListener('DOMContentLoaded', async () => {
    const urlParams = new URLSearchParams(location.search);
    const code  = urlParams.get('discord_code');
    const state = urlParams.get('discord_state');
    const err   = urlParams.get('discord_error');

    if (!code && !err) return;

    history.replaceState({}, '', location.pathname);
    const btn = document.getElementById('btnDiscord');
    setLoading(btn, true);

    if (err) {
      const msg = err === 'access_denied'
        ? 'Discord sign-in was cancelled.'
        : 'Discord auth error: ' + err;
      showToast(msg, 'warning');
      setLoading(btn, false);
      return;
    }

    const savedState = sessionStorage.getItem('discord_oauth_state');
    sessionStorage.removeItem('discord_oauth_state');
    if (state && savedState && state !== savedState) {
      showToast('Security error. Please try again.', 'error');
      setLoading(btn, false);
      return;
    }

    await handleDiscordCode(code, btn);
  });
  </script>
</body>
</html>
