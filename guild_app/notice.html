  <style>
    /* 로딩 오버레이 */
    /* → common_style.css 참조 */

    /* [헤더 스타일] */
    header {
      display: flex !important;
      justify-content: space-between !important;
      align-items: center !important;

      background: #121721 !important;

      box-sizing: border-box !important;

    .user-name-box {

  <script>
  (function(){
    var FOLDER_KEY = 'roider_nav_weekly_open';
    var header   = document.getElementById('navFolderWeekly');
    var children = document.getElementById('navFolderWeeklyChildren');
    if (!header || !children) return;

    var path = window.location.pathname;
    var isInFolder = path.includes('attendance.html') || path.includes('weekly.html') || path.includes('history.html');
    var hasActive  = children.querySelector('.nav-sub-link.active');
    var saved      = localStorage.getItem(FOLDER_KEY);
    var shouldOpen = isInFolder || !!hasActive || saved === '1';

    function setOpen(open) {
      header.classList.toggle('open', open);
      children.classList.toggle('open', open);
      localStorage.setItem(FOLDER_KEY, open ? '1' : '0');
    }
    setOpen(shouldOpen);

    header.addEventListener('click', function(e){
      e.stopPropagation();
      setOpen(!header.classList.contains('open'));
    });
  })();
  </script>

<script>
  let myNickname = "", myRole = "", myUid = "";

  // ── 날짜 포맷 헬퍼 ──────────────────────────────────────
  function formatNoticeDate(ts) {
    if (!ts) return '';
    try {
      const d = ts.toDate ? ts.toDate() : new Date(ts);
      const now = new Date();
      const diff = Math.floor((now - d) / 1000); // 초 단위 차이
      if (diff < 60)  return '방금 전';
      if (diff < 3600) return `${Math.floor(diff/60)}분 전`;
      if (diff < 86400) return `${Math.floor(diff/3600)}시간 전`;
      const y = d.getFullYear(), mo = String(d.getMonth()+1).padStart(2,'0');
      const day = String(d.getDate()).padStart(2,'0');
      const h = String(d.getHours()).padStart(2,'0'), m = String(d.getMinutes()).padStart(2,'0');
      // 올해면 월-일만, 다른 해면 연도 포함
      return now.getFullYear() === y ? `${mo}.${day} ${h}:${m}` : `${y}.${mo}.${day}`;
    } catch(e) { return ''; }
  }

  function formatNoticeDateEN(ts) {
    if (!ts) return '';
    try {
      const d = ts.toDate ? ts.toDate() : new Date(ts);
      const now = new Date();
      const diff = Math.floor((now - d) / 1000);
      if (diff < 60)  return 'Just now';
      if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
      if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
      return d.toLocaleDateString('en-US', { month:'short', day:'numeric', year: now.getFullYear()===d.getFullYear()?undefined:'numeric' });
    } catch(e) { return ''; }
  }

  // ── URL 자동 링크화 ──────────────────────────────────────
  function linkify(text) {
    if (!text) return '';
    // XSS 방지: 먼저 이스케이프 후 URL만 링크로 복원
    const escaped = escapeHtml(text);
    const urlPattern = /(https?:\/\/[^\s<>"'\)\]]+)/g;
    return escaped.replace(urlPattern, url =>
      `<a href="${url}" target="_blank" rel="noopener noreferrer"
          style="color:#7db3ff; text-decoration:underline; word-break:break-all;"
          onclick="event.stopPropagation()">${url}</a>`
    );
  }

  // ✅ [버그수정] XSS 방지용 HTML 이스케이프 함수
  function escapeHtml(str) {
    if (str == null) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function toggleNav(open) {
    const nav = document.getElementById('sideNav');
    const overlay = document.getElementById('overlay');
    if (open) { nav.classList.add('active'); overlay.classList.add('active'); } 
    else { nav.classList.remove('active'); overlay.classList.remove('active'); }
  }

  function handleLangChange() {
    if (typeof window.openLangDropdown === 'function') {
      window.openLangDropdown();
    } else {
      currentLang = (currentLang === 'ko') ? 'en' : 'ko';
      localStorage.setItem('roider_lang', currentLang);
      updateLangButton();
      if (typeof applyLanguage === 'function') applyLanguage();
    }
  }

  function toggleLanguage() { handleLangChange(); }

  function updateLangButton() {
    const langBtn = document.getElementById('langBtn');
    if (langBtn) {
      var lang = localStorage.getItem('roider_lang') || 'ko';
      langBtn.textContent = '🌐 ' + lang.toUpperCase();
    }
  }

  auth.onAuthStateChanged(async user => {
    if (!user) return location.replace("login.html");
    myUid = user.uid;
    try {
      const snap = await db.collection("users").doc(user.uid).get();
      if (!snap.exists || snap.data().role === "pending") return location.replace("pending.html");
      
      const data = snap.data();
      myNickname = data.nickname;
      myRole = (data.role || "member").toLowerCase();

      document.getElementById("loadingOverlay").style.display = "none";
      document.getElementById("userName").textContent = myNickname || "User";
      // 공지 읽음 처리 (뱃지 초기화)
      if (typeof markNoticeRead === 'function') markNoticeRead(db, user.uid);
      
      const photoEl = document.getElementById("userPhoto");
      if (photoEl) {
        photoEl.src = data.customPhotoURL || user.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(myNickname || 'U')}&background=2a3242&color=f4c430&bold=true`;
        // 계급 테두리 적용
        photoEl.className = `border-${myRole}`;
      }
      
      const badgeEl = document.getElementById("myRoleBadge");
      if (badgeEl && myRole) {
        badgeEl.textContent = myRole.toUpperCase();
        badgeEl.className = `role-badge role-${myRole.toUpperCase()}`;
        badgeEl.style.display = "inline-block";
      }

      updateLangButton();
      if (typeof applyLanguage === 'function') applyLanguage();

      if (myRole === "admin" || myRole === "manager") {
        document.getElementById("adminWriteBtn").style.display = "block";
        const navAdmin = document.getElementById("navAdminMenu");
        if (navAdmin) navAdmin.style.display = "block";
      }
      
      loadNotice();

      // 푸시 알림 초기화
      if (window.PushManager) {
        PushManager.init(db, user.uid);
        PushManager.initPushBanner();
        _updatePushUI();
      }
    } catch (err) { console.error(err); showToast('오류가 발생했습니다.', 'error'); }
  });

  // ✅ [버그수정] 공지 데이터 캐시 맵 (editNoticeById에서 사용)
  const noticeDataMap = {};

  function loadNotice() {
    if (window.unsubscribeNotice) window.unsubscribeNotice();
    window.unsubscribeNotice = db.collection("notice").orderBy("createdAt", "desc").onSnapshot(snapshot => {
      const sk = document.getElementById('noticeSkeleton');
      if (sk) sk.remove();
      const list = document.getElementById("noticeList");
      list.innerHTML = "";
      if (snapshot.empty) {
        list.innerHTML = `<p data-i18n="noti_empty">공지사항이 없습니다.</p>`;
        return;
      }
      snapshot.forEach(doc => {
        const data = doc.data();
        const id = doc.id;
        // ✅ [버그수정] 공지 데이터 캐시에 저장
        noticeDataMap[id] = data;
        let actions = "";
        if (myRole === "admin" || myRole === "manager") {
          // ✅ [버그수정] data-* 속성으로 전달 → 백틱/특수문자 포함 데이터 안전 처리
          actions = `<div class="notice-actions">
            <span class="action-link" data-edit-id="${escapeHtml(id)}" onclick="editNoticeById(this)">수정</span>
            <span class="action-link" style="color:#ff5252;" onclick="deleteNotice('${escapeHtml(id)}')">삭제</span>
          </div>`;
        }
        // ✅ [버그수정] escapeHtml 적용으로 XSS 방지
        const lang = localStorage.getItem('roider_lang') || 'ko';
        const dateStr = lang === 'ko'
          ? formatNoticeDate(data.createdAt || data.updatedAt)
          : formatNoticeDateEN(data.createdAt || data.updatedAt);
        const dateHtml = dateStr
          ? `<span style="margin-left:10px; color:#666;">· ${escapeHtml(dateStr)}</span>`
          : '';
        // 수정됨 표시 (updatedAt이 createdAt보다 나중인 경우)
        let editedBadge = '';
        if (data.updatedAt && data.createdAt) {
          try {
            const updated = data.updatedAt.toDate ? data.updatedAt.toDate() : new Date(data.updatedAt);
            const created = data.createdAt.toDate ? data.createdAt.toDate() : new Date(data.createdAt);
            if (updated - created > 5000) { // 5초 이상 차이면 수정됨
              editedBadge = `<span style="font-size:10px; color:#888; margin-left:6px;">(수정됨)</span>`;
            }
          } catch(e) { console.warn('notice error:', e); }
        }
        list.innerHTML += `<div class="notice-card" data-notice-id="${escapeHtml(id)}">
          <h3>${escapeHtml(data.title)}</h3>
          <div style="font-size:12px; color:#aaa; display:flex; align-items:center; flex-wrap:wrap; gap:4px;">
            👤 ${escapeHtml(data.author)}${dateHtml}${editedBadge}
          </div>
          <div style="margin-top:15px; white-space:pre-wrap; line-height:1.7;">${linkify(data.content)}</div>
        </div>`; 
        // ✅ actions는 마지막에 별도 DOM으로 삽입 (escapeHtml 우회 방지)
        if (actions) {
          const card = list.lastElementChild;
          const actionsDiv = document.createElement('div');
          actionsDiv.innerHTML = actions;
          card.insertBefore(actionsDiv.firstChild, card.firstChild);
        }
      });
      if (typeof applyLanguage === 'function') applyLanguage();
    });
  }

  function openModal() { 
    document.getElementById("editId").value = "";
    document.getElementById("noticeTitle").value = "";
    document.getElementById("noticeContent").value = "";
    document.getElementById("modalTitle").textContent = "공지사항 작성";
    const infoEl = document.getElementById("noticeEditInfo");
    if (infoEl) infoEl.style.display = 'none';
    document.getElementById("noticeModal").style.display = "flex"; 
  }
  function closeModal() { document.getElementById("noticeModal").style.display = "none"; }

  // ✅ [버그수정] data-edit-id 속성에서 id를 읽어 noticeDataMap에서 안전하게 데이터 가져옴
  function editNoticeById(el) {
    const id = el.getAttribute('data-edit-id');
    const notice = noticeDataMap[id];
    if (!notice) return;
    document.getElementById("editId").value = id;
    document.getElementById("noticeTitle").value = notice.title || '';
    document.getElementById("noticeContent").value = notice.content || '';
    document.getElementById("modalTitle").textContent = "공지사항 수정";
    // 작성/수정 날짜 표시
    const infoEl = document.getElementById("noticeEditInfo");
    if (infoEl) {
      const lang = localStorage.getItem('roider_lang') || 'ko';
      const created = notice.createdAt ? formatNoticeDate(notice.createdAt) : '';
      const updated = notice.updatedAt ? formatNoticeDate(notice.updatedAt) : '';
      infoEl.textContent = lang === 'ko'
        ? `작성: ${created}${updated && updated !== created ? '  |  수정: ' + updated : ''}`
        : `Created: ${created}${updated && updated !== created ? '  |  Updated: ' + updated : ''}`;
      infoEl.style.display = 'block';
    }
    document.getElementById("noticeModal").style.display = "flex";
  }

  async function deleteNotice(id) {
    const lang = localStorage.getItem('roider_lang') || 'ko';
    const ok = await showConfirm(
      lang === 'ko' ? '이 공지사항을 삭제하시겠습니까?' : 'Delete this notice?',
      { danger: true, icon: '🗑️',
        okText: lang === 'ko' ? '삭제' : 'Delete',
        cancelText: lang === 'ko' ? '취소' : 'Cancel' }
    );
    if (!ok) return;
    try {
      await db.collection("notice").doc(id).delete();
      showToast(lang === 'ko' ? '공지사항이 삭제되었습니다.' : 'Notice deleted.', 'info');
    } catch (e) {
      showToast(lang === 'ko' ? '삭제에 실패했습니다.' : 'Delete failed.', 'error');
    }
  }

  async function saveNotice() {
    const id = document.getElementById("editId").value;
    const title = document.getElementById("noticeTitle").value.trim();
    const content = document.getElementById("noticeContent").value.trim();
    const lang2 = localStorage.getItem('roider_lang') || 'ko';
    if (!title || !content) {
      showToast(lang2 === 'ko' ? '제목과 내용을 모두 입력해 주세요.' : 'Please fill in title and content.', 'warning');
      return;
    }
    const noticeData = { title, content, author: myNickname, authorRole: myRole, authorUid: myUid, updatedAt: firebase.firestore.FieldValue.serverTimestamp() };
    try {
      if (id) { await db.collection("notice").doc(id).update(noticeData); }
      else { noticeData.createdAt = firebase.firestore.FieldValue.serverTimestamp(); await db.collection("notice").add(noticeData); }
      closeModal();
      const langN = localStorage.getItem('roider_lang') || 'ko';
      showToast(langN === 'ko' ? (id ? '공지사항이 수정되었습니다.' : '공지사항이 등록되었습니다! 📢') : (id ? 'Notice updated.' : 'Notice posted! 📢'), 'success');
    } catch (e) {
      const lang3 = localStorage.getItem('roider_lang') || 'ko';
      showToast(lang3 === 'ko' ? '저장에 실패했습니다.' : 'Save failed.', 'error');
    }
  }


  // ── 푸시 알림 토글 ─────────────────────────────────────────
  async function togglePushNotification() {
    const status = PushManager.getPermissionStatus();
    if (status === 'granted' && localStorage.getItem('roider_push_enabled') === '1') {
      // 구독 해제
      const ok = await showConfirm('푸시 알림을 끄시겠습니까?', {
        icon: '🔕', okText: '끄기', cancelText: '취소'
      });
      if (ok) { await PushManager.unsubscribe(); _updatePushUI(); }
    } else {
      // 구독 시작
      const granted = await PushManager.requestPermission();
      if (granted) _updatePushUI();
    }
  }

  // ── 알림 버튼 상태 업데이트 ────────────────────────────────
  function _updatePushUI() {
    const dot  = document.getElementById('pushStatusDot');
    const text = document.getElementById('pushToggleText');
    const btn  = document.getElementById('pushToggleBtn');
    if (!dot || !text) return;

    const status  = PushManager.getPermissionStatus();
    const enabled = localStorage.getItem('roider_push_enabled') === '1';
    const isOn    = status === 'granted' && enabled;

    dot.className  = 'push-status-dot ' + (isOn ? 'on' : 'off');
    text.textContent = isOn ? '🔔 알림 켜짐' : '🔕 알림 켜기';
    if (btn) btn.classList.toggle('active', isOn);
  }

  function logout() { auth.signOut().then(() => location.replace("login.html")); }
</script>
