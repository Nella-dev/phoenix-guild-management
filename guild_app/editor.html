<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phoenix - 포메이션 에디터</title>
<link rel="stylesheet" href="common_style.css">
<link rel="stylesheet" href="header_standard.css">
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="firebase_key.js"></script>
<script src="firebase_config.js"></script>
<script src="ui_utils.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
  <script src="profile_modal.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-messaging-compat.js"></script>
<script src="push_manager.js"></script>
<script src="i18n.js" defer></script>
<script src="i18n_added.js" defer></script>
<script src="i18n_deck.js" defer></script>

<style>
/* ── 표준 레이아웃 (사이드바 + 메인) ── */
.loading-overlay {
  position: fixed; inset: 0; background: #0f1015;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: bold; color: var(--accent);
  z-index: 9999; transition: opacity .5s;
}
.app-container {
  display: flex;
  height: calc(100vh - 60px);
  overflow: hidden;
}
.side-nav {
  width: 260px;
  min-width: 260px;
  background: #141720;
  border-right: 1px solid var(--border);
  overflow-y: auto;
  flex-shrink: 0;
  transition: left 0.3s;
}
.main-content {
  flex: 1;
  overflow-y: auto;
  min-width: 0;
}
@media (max-width: 850px) {
  .menu-trigger { display: flex !important; }
  .side-nav {
    position: fixed; top: 0; left: -280px;
    width: 280px; height: 100vh; z-index: 2100;
    box-shadow: 10px 0 30px rgba(0,0,0,.6);
    border-right: 1px solid var(--border);
  }
  .side-nav.active { left: 0; }
  .app-container { display: block; }
  .main-content { height: calc(100vh - 60px); overflow-y: auto; }
}

/* ═══════════════════════════════════════════════
   Phoenix THEME + YAPHALLA-IDENTICAL GRID ENGINE
═══════════════════════════════════════════════ */
:root {
  --bg:       #0f1015;
  --card:     #1c1f2a;
  --card2:    #161921;
  --accent:   #f4c430;
  --accent2:  #e8a020;
  --text:     #e6e6e6;
  --text-dim: #888;
  --border:   #2a3242;
  --player:   #27ae60;
  --enemy:    #c0392b;
  --obstacle: #7f8c8d;
  --artifact: #f39c12;
  --wall:     #4a4a6a;
  --hex-size: 52px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'NEXON Lv1 Gothic OTF',-apple-system,sans-serif;min-height:100vh;overflow:hidden}

.ed-user-name{font-size:13px;color:var(--accent)}
.btn-logout{background:transparent;border:1px solid var(--border);color:var(--text-dim);padding:4px 10px;border-radius:4px;cursor:pointer;font-size:12px}
.btn-logout:hover{border-color:var(--accent);color:var(--accent)}

/* ── 메인 레이아웃 ─── */
.ed-wrap{display:flex;height:100%;min-height:calc(100vh - 60px)}

/* ── 왼쪽 라이브러리 패널 ─── */
.lib-panel{
  width:260px;min-width:260px;
  background:var(--card2);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  overflow:hidden;
}
.lib-head{padding:12px;border-bottom:1px solid var(--border)}
.lib-tabs{display:flex;gap:4px;margin-bottom:10px}
.lib-tab{flex:1;padding:6px;border:1px solid var(--border);background:transparent;color:var(--text-dim);border-radius:4px;cursor:pointer;font-size:12px;transition:.2s;font-family:inherit}
.lib-tab.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700}
.lib-search{width:100%;padding:6px 10px;background:#0f1015;border:1px solid var(--border);color:var(--text);border-radius:4px;font-size:12px;font-family:inherit}
.lib-search:focus{outline:none;border-color:var(--accent)}
.filter-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.filter-btn{padding:3px 8px;border:1px solid var(--border);background:transparent;color:var(--text-dim);border-radius:12px;cursor:pointer;font-size:11px;transition:.2s;font-family:inherit}
.filter-btn.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700}
.lib-scroll{flex:1;overflow-y:auto;padding:8px}
.lib-scroll::-webkit-scrollbar{width:4px}
.lib-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ── 유닛 그리드 ─── */
.u-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px}
.u-item{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:4px;border-radius:6px;cursor:grab;
  border:1px solid var(--border);transition:.2s;
  background:rgba(255,255,255,.02);
  user-select:none;
}
.u-item:hover{border-color:var(--accent);background:rgba(244,196,48,.08)}
.u-item.dragging{opacity:.5}
.u-hex-wrap{
  width:50px;height:50px;position:relative;
  clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
}
.u-hex-wrap img{width:100%;height:100%;object-fit:cover}
.u-name{font-size:9px;color:var(--text-dim);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%}
.u-faction-dot{width:6px;height:6px;border-radius:50%;position:absolute;bottom:2px;right:2px}

/* ── 아티팩트 그리드 ─── */
.art-section{margin-bottom:12px}
.art-section-title{font-size:11px;color:var(--accent);font-weight:700;margin-bottom:6px;padding-bottom:3px;border-bottom:1px solid var(--border)}
.art-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px}
.art-item{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:4px;border-radius:6px;cursor:grab;
  border:1px solid var(--border);transition:.2s;
  background:rgba(255,255,255,.02);
  user-select:none;
}
.art-item:hover{border-color:var(--artifact);background:rgba(243,156,18,.08)}
.art-hex-wrap{
  width:44px;height:44px;
  clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  background:linear-gradient(135deg,#2a2a3a,#1a1a2e);
  display:flex;align-items:center;justify-content:center;
  border:1px solid var(--artifact);
}
.art-hex-wrap img{width:36px;height:36px;object-fit:contain}
.art-name{font-size:9px;color:var(--text-dim);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%}

/* ── 에디터 메인 ─── */
.editor-main{
  flex:1;display:flex;flex-direction:column;
  overflow:hidden;background:var(--bg);
}

/* ── 툴바 ─── */
.toolbar{
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  padding:8px 16px;
  background:var(--card2);
  border-bottom:1px solid var(--border);
  min-height:50px;
}
.toolbar-section{display:flex;align-items:center;gap:6px}
.toolbar-sep{width:1px;height:24px;background:var(--border)}

/* 진형 모드 버튼 */
.formation-btn{
  width:34px;height:34px;border-radius:50%;
  border:2px solid var(--border);
  background:var(--card);
  color:var(--text-dim);font-size:13px;font-weight:700;
  cursor:pointer;transition:.2s;font-family:inherit;
  display:flex;align-items:center;justify-content:center;
}
.formation-btn:hover{border-color:var(--accent);color:var(--text)}
.formation-btn.active{border-color:var(--accent);background:var(--accent);color:#000}
.formation-label{font-size:11px;color:var(--text-dim);white-space:nowrap}

/* 팀 슬롯 버튼 */
.team-btn{
  padding:4px 10px;border-radius:4px;font-size:11px;font-weight:700;
  border:1px solid var(--border);background:var(--card);
  color:var(--text-dim);cursor:pointer;transition:.2s;font-family:inherit;
  min-width:38px;
}
.team-btn:hover{border-color:var(--accent);color:var(--text)}
.team-btn.active{border-color:var(--accent);background:rgba(244,196,48,.15);color:var(--accent)}
.team-btn.has-units{border-color:var(--player);color:var(--player)}
.team-btn.active.has-units{background:rgba(39,174,96,.15)}

/* 타일 모드 버튼 */
.tile-mode-btn{
  padding:4px 10px;border-radius:4px;font-size:11px;
  border:1px solid var(--border);background:var(--card);
  color:var(--text-dim);cursor:pointer;transition:.2s;font-family:inherit;
}
.tile-mode-btn:hover{border-color:var(--accent);color:var(--text)}
.tile-mode-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(244,196,48,.1)}

/* 토글 버튼 */
.toggle-btn{
  display:flex;align-items:center;gap:5px;
  padding:4px 8px;border-radius:4px;
  border:1px solid var(--border);background:var(--card);
  color:var(--text-dim);cursor:pointer;font-size:11px;transition:.2s;font-family:inherit;
}
.toggle-btn.on{border-color:rgba(244,196,48,.4);color:var(--accent)}
.toggle-btn .tog{width:24px;height:13px;border-radius:7px;background:#333;position:relative;transition:.2s;flex-shrink:0}
.toggle-btn.on .tog{background:var(--accent)}
.toggle-btn .tog::after{content:'';width:9px;height:9px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:.2s}
.toggle-btn.on .tog::after{left:13px}

/* 액션 버튼 */
.action-btn{
  padding:5px 10px;border-radius:4px;font-size:11px;font-weight:700;
  border:none;cursor:pointer;transition:.2s;font-family:inherit;white-space:nowrap;
}
.btn-danger{background:#c0392b;color:#fff}
.btn-danger:hover{background:#e74c3c}
.btn-warning{background:#e67e22;color:#fff}
.btn-warning:hover{background:#f39c12}
.btn-primary{background:var(--accent);color:#000}
.btn-primary:hover{background:var(--accent2)}
.btn-info{background:#2980b9;color:#fff}
.btn-info:hover{background:#3498db}
.btn-share{background:linear-gradient(135deg,#9b59b6,#8e44ad);color:#fff}
.btn-share:hover{background:linear-gradient(135deg,#a66bbe,#9b59b6)}

/* ── 에디터 콘텐츠 ─── */
.editor-content{
  flex:1;display:flex;align-items:flex-start;justify-content:center;
  padding:20px;overflow:auto;gap:20px;
}

/* ── 캡처 영역 ─── */
.capture-wrap{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:20px;
  display:flex;flex-direction:column;align-items:center;gap:12px;
  min-width:fit-content;
}
.capture-title{
  font-size:13px;color:var(--accent);font-weight:700;
  display:flex;align-items:center;gap:8px;
}
.capture-subtitle{font-size:11px;color:var(--text-dim)}

/* ── 헥사곤 그리드 ─── */
/* Yaphalla 원본과 동일한 flat-top hex, 9행 구조 */
.hex-grid-outer{
  display:flex;flex-direction:column;
  align-items:center;gap:2px;
  position:relative;
}
.hex-row{
  display:flex;gap:2px;
  align-items:center;
}
/* 각 행의 들여쓰기 (Yaphalla pl-xx → margin-left) */
.hex-row.off-0{margin-left:0}
.hex-row.off-1{margin-left:calc(var(--hex-size)*0.5 + 1px)}  /* 반 칸 오프셋 */
.hex-row.off-2{margin-left:calc(var(--hex-size)*1.0 + 2px)}  /* 한 칸 오프셋 */
.hex-row.off-3{margin-left:calc(var(--hex-size)*1.5 + 3px)}  /* 한 칸 반 오프셋 */
.hex-row.off-6{margin-left:calc(var(--hex-size)*3.0 + 6px)}  /* 세 칸 오프셋 */

/* 헥사곤 타일 */
.htile{
  width:var(--hex-size);
  height:var(--hex-size);
  clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  position:relative;cursor:pointer;
  transition:filter .15s, transform .1s;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  user-select:none;
}
.htile:hover{transform:scale(1.06);z-index:2}
.htile.drag-over{filter:brightness(1.5);transform:scale(1.08)}

/* 타일 타입 배경 */
.htile.type-empty  {background:transparent;cursor:default;pointer-events:none}
.htile.type-player {background:radial-gradient(circle,#1e3a2a,#0d2218);border:none}
.htile.type-enemy  {background:radial-gradient(circle,#3a1a1a,#220d0d);border:none}
.htile.type-obstacle{background:radial-gradient(circle,#3a3a3a,#222);border:none;cursor:not-allowed}
.htile.type-wall   {background:radial-gradient(circle,#2a2a4a,#1a1a2e);border:none}
.htile.type-artifact{background:radial-gradient(circle,#3a2800,#1e1400);border:none}

/* 타일 외곽선 이미지 오버레이 */
.htile::before{
  content:'';position:absolute;inset:0;
  clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  background-image:var(--outline-img);
  background-size:contain;background-repeat:no-repeat;background-position:center;
  pointer-events:none;z-index:1;opacity:.9;
}
.htile.type-player::before{--outline-img:url('https://www.yaphalla.com/assets/images/hexes/base/Generic-Outline.png')}
.htile.type-enemy::before {--outline-img:url('https://www.yaphalla.com/assets/images/hexes/base/Enemy-Outline.png')}
.htile.type-obstacle::before{--outline-img:url('https://www.yaphalla.com/assets/images/hexes/base/Unbreakable-Hex.png')}
.htile.type-wall::before  {--outline-img:url('https://www.yaphalla.com/assets/images/hexes/base/Breakable-Hex.png')}
.htile.type-artifact::before{--outline-img:url('https://www.yaphalla.com/assets/images/hexes/base/artifact/Artifact-Hex.png')}

/* 타일 번호 */
.tile-num{
  position:absolute;z-index:3;
  font-size:10px;font-weight:700;color:rgba(255,255,255,.7);
  pointer-events:none;
}
.htile.type-artifact .tile-num{color:var(--artifact);font-size:11px}

/* 타일 위에 배치된 유닛 */
.tile-unit{
  position:absolute;inset:0;z-index:4;
  clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  display:flex;align-items:center;justify-content:center;
}
.tile-unit img{width:90%;height:90%;object-fit:cover;
  clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);}
/* 유닛 이름 (하단) */
.tile-unit-name{
  position:absolute;bottom:4px;z-index:5;
  font-size:8px;color:#fff;font-weight:700;
  text-shadow:0 0 3px #000;pointer-events:none;
}
/* 유닛 삭제 버튼 */
.tile-del{
  position:absolute;top:2px;right:8px;z-index:6;
  width:14px;height:14px;border-radius:50%;
  background:rgba(192,57,43,.9);color:#fff;
  font-size:10px;font-weight:700;cursor:pointer;
  display:none;align-items:center;justify-content:center;
  line-height:1;
}
.htile:hover .tile-del{display:flex}

/* 아티팩트 타일 위 아티팩트 표시 */
.tile-artifact{
  position:absolute;inset:0;z-index:4;
  display:flex;align-items:center;justify-content:center;
}
.tile-artifact img{width:70%;height:70%;object-fit:contain}

/* 팀 인디케이터 dot */
.tile-team-dot{
  position:absolute;bottom:3px;left:50%;transform:translateX(-50%);
  width:6px;height:6px;border-radius:50%;z-index:7;
  pointer-events:none;
}

/* 그리드 토글 오버레이 */
.htile.hide-num .tile-num{display:none}
.htile.hide-enemy.type-enemy{opacity:.3;pointer-events:none}

/* ── 오른쪽 설정 패널 ─── */
.right-panel{
  width:220px;min-width:220px;
  background:var(--card2);
  border-left:1px solid var(--border);
  display:flex;flex-direction:column;
  overflow-y:auto;padding:12px;gap:10px;
}
.right-panel::-webkit-scrollbar{width:4px}
.right-panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.rp-section{border:1px solid var(--border);border-radius:8px;padding:10px}
.rp-title{font-size:11px;color:var(--accent);font-weight:700;margin-bottom:8px}
.rp-select{
  width:100%;padding:5px 8px;background:#0f1015;
  border:1px solid var(--border);color:var(--text);
  border-radius:4px;font-size:12px;font-family:inherit;cursor:pointer;
}
.rp-select:focus{outline:none;border-color:var(--accent)}
.rp-select option{background:#1c1f2a}
.rp-team-list{display:flex;flex-wrap:wrap;gap:4px}
.rp-team-item{
  padding:3px 8px;border-radius:4px;font-size:11px;font-weight:700;
  border:1px solid var(--border);background:var(--card);
  color:var(--text-dim);cursor:pointer;transition:.2s;
}
.rp-team-item:hover{border-color:var(--accent);color:var(--accent)}
.rp-team-item.active{border-color:var(--accent);background:rgba(244,196,48,.15);color:var(--accent)}
.rp-team-item.occupied{border-color:var(--player)}

/* 팀 색상 점 */
.team-color-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}

/* 중복 유닛 경고 배지 */
.htile.dup-warn::after{
  content:'!';
  position:absolute;top:2px;left:50%;transform:translateX(-50%);
  background:#e74c3c;color:#fff;font-size:9px;font-weight:700;
  width:13px;height:13px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;z-index:8;
}

/* ── 모달 ─── */
.modal-bg{
  display:none;position:fixed;inset:0;z-index:1000;
  background:rgba(0,0,0,.7);align-items:center;justify-content:center;
}
.modal-bg.show{display:flex}
.modal{
  background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:24px;min-width:360px;max-width:500px;width:90%;
}
.modal h3{color:var(--accent);margin-bottom:16px;font-size:16px}
.modal input,.modal textarea,.modal select{
  width:100%;padding:8px 12px;background:#0f1015;
  border:1px solid var(--border);color:var(--text);
  border-radius:6px;font-size:13px;font-family:inherit;
  margin-bottom:10px;
}
.modal input:focus,.modal textarea:focus{outline:none;border-color:var(--accent)}
.modal textarea{height:80px;resize:vertical}
.modal-desc{font-size:12px;color:var(--text-dim);margin-bottom:12px}
.modal-desc span{color:var(--accent);font-weight:700}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}
.modal-btns button{padding:8px 18px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit}
.btn-cancel{background:transparent;border:1px solid var(--border);color:var(--text-dim)}
.btn-cancel:hover{border-color:var(--accent);color:var(--text)}
.btn-confirm{background:var(--player);border:none;color:#fff}
.btn-confirm:hover{background:#2ecc71}

/* ── 토스트 알림 ─── */
.toast{
  position:fixed;bottom:24px;right:24px;z-index:2000;
  background:var(--card);border:1px solid var(--accent);
  color:var(--text);padding:10px 18px;border-radius:8px;
  font-size:13px;transition:opacity .3s;pointer-events:none;
  opacity:0;
}
.toast.show{opacity:1}

/* ── 반응형 ─── */
@media(max-width:1200px){
  .right-panel{display:none}
  :root{--hex-size:46px}
}
@media(max-width:900px){
  .lib-panel{width:200px;min-width:200px}
  :root{--hex-size:40px}
}
</style>
</head>
<body>


<div id="loadingOverlay" class="loading-overlay">Phoenix Guild Loading...</div>

<header>
  <div class="header-left">
    <button class="menu-trigger" onclick="toggleNav(true)">☰</button>
    <div class="logo" id="appTitle" onclick="location.href='main.html'">Phoenix Guild</div>
  </div>
  <div class="user-box">
    <button class="logout-btn" id="langBtn" onclick="toggleLanguage()" style="background:rgba(255,255,255,0.05); border:1px solid #444; color:#ccc; padding:5px 12px; border-radius:20px; font-size:12px; cursor:pointer;">🌐 EN</button>
  </div>
</header>

<div class="overlay" id="overlay" onclick="toggleNav(false)"></div>

/* ═══════════════════════════════════════════
   GRID BUILD — 45타일 Yaphalla 동일 구조
═══════════════════════════════════════════ */
function buildGrid(){
  const container = document.getElementById('hexGrid');
  container.innerHTML = '';
  const arenaData = ARENA_DATA[state.currentArena] || ARENA_DATA['Arena I'];
  const artIdx    = ARTIFACT_TILE[state.currentArena] ?? 44;

  let tileIdx = 0;
  GRID_ROWS.forEach((row, rowNum) => {
    const rowDiv = document.createElement('div');
    rowDiv.className = `hex-row ${row.cls}`;

    for(let c = 0; c < row.len; c++){
      const val = arenaData[tileIdx];
      const isArtifact = (tileIdx === artIdx);
      const tile = createTile(tileIdx, val, isArtifact);
      rowDiv.appendChild(tile);
      tileIdx++;
    }
    container.appendChild(rowDiv);
  });

  updateGridDisplay();
  updateTeamLegend();
}

function tileTypeFromVal(val, isArtifact){
  if(isArtifact) return 'artifact';
  switch(val){
    case -1: return 'empty';
    case  0: return 'player';
    case  1: return 'enemy';
    case -2: return 'obstacle';
    case -3: return 'wall';
    default: return 'player';
  }
}

function createTile(idx, val, isArtifact){
  const type = tileTypeFromVal(val, isArtifact);

  const div = document.createElement('div');
  div.className = `htile type-${type}`;
  div.dataset.idx = idx;
  div.dataset.type = type;

  if(type === 'empty'){
    // 빈 타일 — 투명, 클릭 불가
    return div;
  }

  // 번호 표시
  if(type !== 'artifact'){
    const num = document.createElement('span');
    num.className = 'tile-num';
    // 플레이어/적 타일 번호 (1부터 순서대로)
    num.textContent = idx + 1;
    div.appendChild(num);
  } else {
    const num = document.createElement('span');
    num.className = 'tile-num';
    num.textContent = 'A1';
    div.appendChild(num);
  }

  // 유닛 슬롯
  const unitSlot = document.createElement('div');
  unitSlot.className = 'tile-unit';
  unitSlot.style.display = 'none';
  div.appendChild(unitSlot);

  // 아티팩트 슬롯
  const artSlot = document.createElement('div');
  artSlot.className = 'tile-artifact';
  artSlot.style.display = 'none';
  div.appendChild(artSlot);

  // 팀 닷
  const teamDot = document.createElement('div');
  teamDot.className = 'tile-team-dot';
  div.appendChild(teamDot);

  // 삭제 버튼
  const delBtn = document.createElement('div');
  delBtn.className = 'tile-del';
  delBtn.textContent = '×';
  delBtn.onclick = (e) => { e.stopPropagation(); removeFromTile(idx); };
  div.appendChild(delBtn);

  // 이벤트
  div.onclick = () => onTileClick(idx);
  div.ondragover = (e) => { e.preventDefault(); div.classList.add('drag-over'); };
  div.ondragleave = () => div.classList.remove('drag-over');
  div.ondrop = (e) => { e.preventDefault(); div.classList.remove('drag-over'); onTileDrop(e, idx); };

  return div;
}

/* ═══════════════════════════════════════════
   TILE INTERACTION
═══════════════════════════════════════════ */
function onTileClick(idx){
  const tile = getTileEl(idx);
  if(!tile) return;
  const type = tile.dataset.type;

  if(state.tileMode === 'erase'){
    removeFromTile(idx);
    return;
  }
  if(state.tileMode === 'obstacle'){
    setTileTypeManual(idx, 'obstacle'); return;
  }
  if(state.tileMode === 'wall'){
    setTileTypeManual(idx, 'wall'); return;
  }

  // unit 모드
  if(type === 'artifact'){
    // 아티팩트 배치
    if(state.selectedArtifact){
      placeArtifact(idx, state.selectedArtifact);
    }
    return;
  }
  if(type !== 'player' && type !== 'enemy') return;

  if(state.selectedHero){
    placeHero(idx, state.selectedHero);
  }
}

function onTileDrop(e, idx){
  const data = e.dataTransfer.getData('text/plain');
  if(!data) return;
  try{
    const obj = JSON.parse(data);
    if(obj.type === 'hero'){
      placeHero(idx, obj.name);
    } else if(obj.type === 'artifact'){
      placeArtifact(idx, obj.name);
    }
  } catch(ex){}
}

function placeHero(idx, heroName){
  const tile = getTileEl(idx);
  if(!tile) return;
  if(tile.dataset.type === 'empty') return;

  // 팀 데이터에 저장
  if(!state.teams[state.currentTeam]) state.teams[state.currentTeam] = {};
  state.teams[state.currentTeam][idx] = { hero: heroName };

  // 시각 업데이트
  renderTileUnit(idx, heroName);
  updateTeamBtn(state.currentTeam);
  updateTeamLegend();
  if(state.dupCheck) checkDuplicates();
  saveToStorage();
}

function placeArtifact(idx, artName){
  const tile = getTileEl(idx);
  if(!tile) return;
  if(tile.dataset.type !== 'artifact') return;

  if(!state.teams[state.currentTeam]) state.teams[state.currentTeam] = {};
  state.teams[state.currentTeam]['art_' + idx] = { artifact: artName };

  renderTileArtifact(idx, artName);
  saveToStorage();
}

function removeFromTile(idx){
  const tile = getTileEl(idx);
  if(!tile) return;

  // 팀 데이터에서 제거
  if(state.teams[state.currentTeam]){
    delete state.teams[state.currentTeam][idx];
    delete state.teams[state.currentTeam]['art_' + idx];
  }

  // 시각 초기화
  const unitSlot = tile.querySelector('.tile-unit');
  const artSlot  = tile.querySelector('.tile-artifact');
  const teamDot  = tile.querySelector('.tile-team-dot');
  if(unitSlot){ unitSlot.style.display = 'none'; unitSlot.innerHTML = ''; }
  if(artSlot) { artSlot.style.display  = 'none'; artSlot.innerHTML  = ''; }
  if(teamDot) { teamDot.style.background = 'transparent'; }
  tile.classList.remove('dup-warn');

  updateTeamBtn(state.currentTeam);
  updateTeamLegend();
  saveToStorage();
}

function setTileTypeManual(idx, newType){
  const tile = getTileEl(idx);
  if(!tile) return;
  // 타입 변경
  tile.className = tile.className.replace(/type-\w+/, `type-${newType}`);
  tile.dataset.type = newType;
}

function renderTileUnit(idx, heroName){
  const tile = getTileEl(idx);
  if(!tile) return;
  const unitSlot = tile.querySelector('.tile-unit');
  if(!unitSlot) return;

  const imgUrl = `https://www.yaphalla.com/assets/images/hexes/unit/${encodeURIComponent(heroName)}.png`;
  unitSlot.innerHTML = `<img src="${imgUrl}" alt="${heroName}" loading="lazy"
    onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2252%22 height=%2252%22><rect fill=%22%23333%22 width=%2252%22 height=%2252%22/><text x=%2226%22 y=%2232%22 text-anchor=%22middle%22 fill=%22%23aaa%22 font-size=%2210%22>${heroName.slice(0,3)}</text></svg>'">`;
  unitSlot.style.display = 'flex';

  // 팀 닷 색상
  const dot = tile.querySelector('.tile-team-dot');
  if(dot) dot.style.background = TEAM_COLORS[state.currentTeam];
}

/* 아티팩트 URL 생성 (카테고리별 경로 분리) */
function getArtifactUrl(artName){
  // pre-season 카테고리
  if(ARTIFACTS.preseason && ARTIFACTS.preseason.includes(artName)){
    return `https://www.yaphalla.com/assets/images/hexes/artifact/pre-season/${encodeURIComponent(artName)}.png`;
  }
  // honor-duel 카테고리
  if(ARTIFACTS.honorduel && ARTIFACTS.honorduel.includes(artName)){
    return `https://www.yaphalla.com/assets/images/hexes/artifact/honor-duel/${encodeURIComponent(artName)}.png`;
  }
  // seasonal → season-6 폴더 (Yaphalla 원본 확인)
  return `https://www.yaphalla.com/assets/images/hexes/artifact/season-6/${encodeURIComponent(artName)}.png`;
}

function renderTileArtifact(idx, artName){
  const tile = getTileEl(idx);
  if(!tile) return;
  const artSlot = tile.querySelector('.tile-artifact');
  if(!artSlot) return;

  const imgUrl = getArtifactUrl(artName);
  artSlot.innerHTML = `<img src="${imgUrl}" alt="${artName}" 
    onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2244%22 height=%2244%22><rect fill=%22%23f39c12%22 width=%2244%22 height=%2244%22 opacity=%22.3%22/><text x=%2222%22 y=%2228%22 text-anchor=%22middle%22 fill=%22%23f39c12%22 font-size=%228%22>${artName.slice(0,3)}</text></svg>'"
    loading="lazy">`;
  artSlot.style.display = 'flex';
}

function getTileEl(idx){
  return document.querySelector(`.htile[data-idx="${idx}"]`);
}

}

/* ═══════════════════════════════════════════
   FORMATION MODE (1/2/3/5 팀)
═══════════════════════════════════════════ */
function setFormationMode(mode, btn){
  state.formationMode = mode;
  document.querySelectorAll('.formation-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  // 팀 슬롯 표시 개수 업데이트
  buildTeamSlots();
  updateCaptureTitle();
  // 현재 팀을 범위 내로
  if(state.currentTeam >= mode){
    switchTeam(0, document.querySelector('.team-btn'));
  }
}

function buildTeamSlots(){
  const container = document.getElementById('teamSlots');
  container.innerHTML = '';

  // 진형 모드에 따른 팀 수
  const teamCount = state.formationMode === 5 ? 15 : state.formationMode * 3;
  const showCount = Math.max(teamCount, 5);

  const label = document.createElement('span');
  label.className = 'formation-label';
  label.textContent = '팀';
  container.appendChild(label);

  for(let i = 0; i < 15; i++){
    const btn = document.createElement('button');
    btn.className = 'team-btn' + (i === state.currentTeam ? ' active' : '');
    btn.textContent = `팀 ${i + 1}`;
    btn.dataset.teamIdx = i;
    btn.onclick = function(){ switchTeam(i, this); };
    if(i >= showCount) btn.style.opacity = '0.35';
    container.appendChild(btn);
    updateTeamBtn(i);
  }
}

function switchTeam(idx, btn){
  state.currentTeam = idx;
  document.querySelectorAll('.team-btn').forEach(b => b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  else {
    const b = document.querySelector(`.team-btn[data-team-idx="${idx}"]`);
    if(b) b.classList.add('active');
  }
  updateTeamLegend();
}

function updateTeamBtn(idx){
  const btn = document.querySelector(`.team-btn[data-team-idx="${idx}"]`) ||
              Array.from(document.querySelectorAll('.team-btn'))[idx];
  if(!btn) return;
  const hasUnits = state.teams[idx] && Object.keys(state.teams[idx]).length > 0;
  if(hasUnits){
    btn.classList.add('has-units');
    btn.style.borderColor = TEAM_COLORS[idx];
    btn.style.color = TEAM_COLORS[idx];
  } else {
    btn.classList.remove('has-units');
    btn.style.borderColor = '';
    btn.style.color = '';
  }
}

/* ═══════════════════════════════════════════
   DISPLAY OPTIONS
═══════════════════════════════════════════ */
function toggleOpt(opt, btn){
  btn.classList.toggle('on');
  const isOn = btn.classList.contains('on');
  if(opt === 'grid')    state.showGrid    = isOn;
  if(opt === 'enemy')   state.showEnemy   = isOn;
  if(opt === 'numbers') state.showNumbers = isOn;
  if(opt === 'empty')   state.showEmptyArtifact = isOn;
  updateGridDisplay();
}

function updateGridDisplay(){
  document.querySelectorAll('.htile').forEach(t => {
    if(!state.showNumbers) t.classList.add('hide-num');
    else t.classList.remove('hide-num');
    if(!state.showEnemy && t.dataset.type === 'enemy')
      t.classList.add('hide-enemy');
    else t.classList.remove('hide-enemy');
  });
}

/* ═══════════════════════════════════════════
   RESTORE ALL TEAMS ON GRID
═══════════════════════════════════════════ */
function restoreAllTeams(){
  state.teams.forEach((teamData, teamIdx) => {
    if(!teamData) return;
    const prevTeam = state.currentTeam;
    state.currentTeam = teamIdx;
    Object.entries(teamData).forEach(([key, val]) => {
      const idx = parseInt(key);
      if(!isNaN(idx) && val.hero) renderTileUnit(idx, val.hero);
    });
    state.currentTeam = prevTeam;
  });
}

/* ═══════════════════════════════════════════
   TEAM LEGEND
═══════════════════════════════════════════ */
function updateTeamLegend(){
  const legend = document.getElementById('teamLegend');
  legend.innerHTML = '';
  state.teams.forEach((teamData, idx) => {
    if(!teamData || Object.keys(teamData).length === 0) return;
    const heroCount = Object.values(teamData).filter(v => v.hero).length;
    const item = document.createElement('div');
    item.style.cssText = `display:flex;align-items:center;gap:4px;font-size:11px;
      padding:2px 8px;border-radius:10px;cursor:pointer;
      background:rgba(${hexToRgb(TEAM_COLORS[idx])},.15);
      border:1px solid ${TEAM_COLORS[idx]};color:${TEAM_COLORS[idx]}`;
    item.innerHTML = `<span style="width:8px;height:8px;border-radius:50%;background:${TEAM_COLORS[idx]};display:inline-block"></span>팀 ${idx+1} (${heroCount})`;
    item.onclick = () => {
      switchTeam(idx, null);
      document.querySelectorAll('.team-btn').forEach((b,i) => {
        if(i === idx) b.classList.add('active'); else b.classList.remove('active');
      });
    };
    legend.appendChild(item);
  });
  if(legend.children.length === 0){
    const ph = document.createElement('div');
    ph.style.cssText = 'font-size:11px;color:var(--text-dim)';
    ph.textContent = '팀 1';
    legend.appendChild(ph);
  }
}

function hexToRgb(hex){
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

/* ═══════════════════════════════════════════
   LIBRARY — UNIT
═══════════════════════════════════════════ */
function buildUnitGrid(){
  const grid = document.getElementById('uGrid');
  grid.innerHTML = '';

  const filtered = HEROES.filter(h => {
    const q = document.getElementById('heroSearch')?.value.toLowerCase() || '';
    const matchName = h.name.toLowerCase().includes(q);
    const matchClass = !classFilter || h.cls === classFilter;
    const matchFaction = !factionFilter || h.faction === factionFilter;
    return matchName && matchClass && matchFaction;
  });

  filtered.forEach(hero => {
    const item = document.createElement('div');
    item.className = 'u-item';
    item.draggable = true;
    item.title = `${hero.name} (${hero.faction} ${hero.cls})`;

    const imgUrl = `https://www.yaphalla.com/assets/images/hexes/unit/${encodeURIComponent(hero.name)}.png`;
    const fColor = FACTION_COLORS[hero.faction] || '#888';

    item.innerHTML = `
      <div class="u-hex-wrap">
        <img src="${imgUrl}" alt="${hero.name}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2250%22 height=%2250%22><rect fill=%22%23333%22 width=%2250%22 height=%2250%22/><text x=%2225%22 y=%2232%22 text-anchor=%22middle%22 fill=%22%23888%22 font-size=%2210%22>${hero.name.slice(0,2)}</text></svg>'">
        <div class="u-faction-dot" style="background:${fColor}"></div>
      </div>
      <span class="u-name">${hero.name}</span>`;

    item.onclick = () => {
      document.querySelectorAll('.u-item').forEach(i => i.style.outline = '');
      item.style.outline = `2px solid var(--accent)`;
      state.selectedHero = hero.name;
      state.selectedArtifact = null;
    };
    item.ondragstart = (e) => {
      e.dataTransfer.setData('text/plain', JSON.stringify({type:'hero', name:hero.name}));
      item.classList.add('dragging');
    };
    item.ondragend = () => item.classList.remove('dragging');

    grid.appendChild(item);
  });
}

function filterHeroes(){
  buildUnitGrid();
}

function setFilter(type, value, btn){
  if(type === 'class'){
    classFilter = value;
    document.querySelectorAll('#classFilters .filter-btn').forEach(b => b.classList.remove('active'));
  } else {
    factionFilter = value;
    document.querySelectorAll('#factionFilters .filter-btn').forEach(b => b.classList.remove('active'));
  }
  btn.classList.add('active');
  buildUnitGrid();
}

  const sections = {

    honorduel: { label:'명예 결투',   items: ARTIFACTS.honorduel },
  };

  Object.entries(sections).forEach(([key, sec]) => {

    section.id = `art-${key}`;
    section.style.display = show ? '' : 'none';

    const title = document.createElement('div');

    title.textContent = sec.label;
    section.appendChild(title);

    sec.items.forEach(art => {
      const item = document.createElement('div');
      item.className = 'art-item';
      item.draggable = true;

      const imgUrl = getArtifactUrl(art);
      item.innerHTML = `
        <div class="art-hex-wrap">
          <img src="${imgUrl}" alt="${art}" onerror="this.style.display='none'">

function buildMiniGrid(arenaName){
  const data = ARENA_DATA[arenaName] || Array(45).fill(0);
  let html = '<div style="display:flex;flex-direction:column;gap:1px;align-items:center">';
  let idx = 0;
  GRID_ROWS.forEach(row => {
    const ml = {0:0,1:7,2:14,3:21,6:42}[parseInt(row.cls.replace('off-',''))] || 0;
    html += `<div style="display:flex;gap:1px;margin-left:${ml}px">`;
    for(let c = 0; c < row.len; c++){
      const v = data[idx];
      let color = '#333';
      if(v === 0)  color = '#27ae60';
      if(v === 1)  color = '#c0392b';
      if(v === -2) color = '#7f8c8d';
      if(v === -3) color = '#8B6914';
      if(v === -1) color = 'transparent';
      html += `<div style="width:12px;height:12px;
        clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
        background:${color}"></div>`;
      idx++;
    }
    html += '</div>';
  });
  html += '</div>';
  return html;
}

/* ═══════════════════════════════════════════
   ACTIONS
═══════════════════════════════════════════ */
function checkDuplicates(){
  const allHeroes = {};
  // 현재 진형 모드에 따른 팀 범위
  const teamCount = state.formationMode === 5 ? 15 : state.formationMode * 3;

  state.teams.slice(0, teamCount).forEach((teamData, ti) => {
    if(!teamData) return;
    Object.values(teamData).forEach(v => {
      if(v.hero){
        if(!allHeroes[v.hero]) allHeroes[v.hero] = 0;
        allHeroes[v.hero]++;
      }
    });
  });

  // 중복 표시 초기화
  document.querySelectorAll('.htile').forEach(t => t.classList.remove('dup-warn'));

  // 중복 있는 타일 표시
  let dupCount = 0;
  state.teams.forEach((teamData, ti) => {
    if(!teamData) return;
    Object.entries(teamData).forEach(([key, val]) => {
      if(val.hero && allHeroes[val.hero] > 1){
        const tile = getTileEl(parseInt(key));
        if(tile) tile.classList.add('dup-warn');
        dupCount++;
      }
    });
  });

  if(dupCount > 0){
    showToast(`⚠️ 중복 유닛 ${dupCount}개 발견!`);
  } else {
    showToast('✅ 중복 없음');
  }
}

function clearAllUnits(){
  if(!confirm('모든 팀의 유닛을 지울까요?')) return;
  state.teams = Array.from({length:15}, () => ({}));
  buildGrid();
  buildTeamSlots();
  saveToStorage();
  showToast('🗑️ 전체 지워짐');
}

function copyToClipboard(){
  const data = {
    arena: state.currentArena,

  navigator.clipboard.writeText(JSON.stringify(data, null, 2))

}

/* ═══════════════════════════════════════════
   SHARE
═══════════════════════════════════════════ */
function openShareModal(){
  document.getElementById('shareFormationType').value = state.formationMode;
  document.getElementById('shareModal').classList.add('show');
}
function closeShareModal(){
  document.getElementById('shareModal').classList.remove('show');
}

async function submitShare(){
  const title = document.getElementById('shareTitle').value.trim();
  const desc  = document.getElementById('shareDesc').value.trim();
  const fType = parseInt(document.getElementById('shareFormationType').value);

  if(!title){ showToast('⚠️ 제목을 입력해주세요'); return; }

  // 유닛 데이터 정리
  const teamCount = fType === 5 ? 15 : fType * 3;
  const teamsData = state.teams.slice(0, teamCount).map(td => {
    if(!td) return {};
    const units = {};
    Object.entries(td).forEach(([k,v]) => {
      if(v.hero || v.artifact) units[k] = v;
    });
    return units;
  });

  // 미리보기 이미지용 히어로 목록
  const previewHeroes = [];
  teamsData.forEach(td => {
    Object.values(td).forEach(v => {
      if(v.hero && !previewHeroes.includes(v.hero)) previewHeroes.push(v.hero);
    });
  });

  const shareData = {
    title,
    description: desc,
    arena: state.currentArena,
    formationMode: fType,
    teams: teamsData,
    previewHeroes: previewHeroes.slice(0,15),
    authorId: currentUser?.uid || 'anonymous',
    authorName: currentUser?.displayName || currentUser?.email || '익명',
    createdAt: new Date(),
    likes: 0
  };

  if(db){
    try{
      await db.collection('shared_formations').add(shareData);
      showToast('✅ 공유 완료!');
      closeShareModal();
      setTimeout(() => { window.location.href = 'formation_board.html'; }, 1000);
    } catch(e){
      showToast('❌ 공유 실패: ' + e.message);
    }
  } else {
    // Firebase 없을 때 로컬 저장 시뮬레이션
    const stored = JSON.parse(localStorage.getItem('shared_formations') || '[]');
    shareData.createdAt = new Date().toISOString();
    shareData.id = Date.now().toString();
    stored.unshift(shareData);
    localStorage.setItem('shared_formations', JSON.stringify(stored.slice(0,50)));
    showToast('✅ 공유 완료! (로컬)');
    closeShareModal();
    setTimeout(() => { window.location.href = 'formation_board.html'; }, 1000);
  }
}

/* ═══════════════════════════════════════════
   STORAGE
═══════════════════════════════════════════ */
function saveToStorage(){
  try{
    localStorage.setItem('roider_editor_v2', JSON.stringify({
      arena: state.currentArena,
      formationMode: state.formationMode,
      currentTeam: state.currentTeam,
      teams: state.teams
    }));
  } catch(e){}
}

function loadFromStorage(){
  try{
    const raw = localStorage.getItem('roider_editor_v2');
    if(!raw) return;
    const saved = JSON.parse(raw);
    if(saved.teams) state.teams = saved.teams;
    if(saved.formationMode) state.formationMode = saved.formationMode;
    if(saved.currentTeam !== undefined) state.currentTeam = saved.currentTeam;
    if(saved.arena){
      loadArenaPreset(saved.arena);
    } else {
      restoreAllTeams();
    }
    buildTeamSlots();
    updateTeamLegend();
  } catch(e){}
}

   TOAST
═══════════════════════════════════════════ */
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

});

// 모달 배경 클릭
document.getElementById('shareModal').addEventListener('click', function(e){
  if(e.target === this) closeShareModal();
});

// 자동 저장 (30초)
setInterval(saveToStorage, 30000);
