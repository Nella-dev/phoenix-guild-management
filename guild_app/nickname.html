<!DOCTYPE html>
<html lang="en">
<head>
  <!-- DNS Prefetch & Preconnect for performance -->
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://identitytoolkit.googleapis.com" crossorigin>
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
  <link rel="dns-prefetch" href="https://fonts.googleapis.com">
  <link rel="dns-prefetch" href="https://ui-avatars.com">

  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Phoenix Guild – Set Nickname</title>

  <link rel="stylesheet" href="header_standard.css">
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <script src="firebase_key.js"></script>
  <script src="firebase_config.js"></script>
  <script src="ui_utils.js"></script>

  <style>
    /* ── Page layout ── */
    body {
      margin: 0;
      background: radial-gradient(circle at top, #1b2333, #0f1015 60%);
      color: #eee;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      min-height: 100dvh;
      font-family: system-ui, -apple-system, sans-serif;
    }

    /* ── Header overrides (nickname page has no sidebar) ── */
    header {
      display: flex !important;
      justify-content: space-between !important;
      align-items: center !important;
      padding: 0 15px !important;
      background: #0d1117 !important;
      border-bottom: 1px solid #2a3242 !important;
      position: sticky !important;
      top: 0 !important;
      z-index: 1000 !important;
      height: 100px !important;
      box-shadow: 0 4px 20px rgba(0,0,0,0.6) !important;
    }
    @media (max-width: 850px) { header { height: 80px !important; } }
    @media (max-width: 500px) { header { height: 68px !important; } }
    @media (max-width: 360px) { header { height: 60px !important; } }

    /* ── User chip (top-right) ── */
    .header-user-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.05);
      border: 1px solid #2a3242;
      border-radius: 30px;
      padding: 5px 12px 5px 6px;
      z-index: 2;
    }
    .header-user-chip img {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid #f4c43055;
    }
    .header-user-chip span {
      font-size: 13px;
      font-weight: 600;
      color: #ccc;
      max-width: 120px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Centre container ── */
    .container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 16px;
    }

    /* ── Card ── */
    .card {
      background: #1c1f2a;
      padding: 40px 30px;
      border-radius: 20px;
      text-align: center;
      width: 100%;
      max-width: 380px;
      border: 1px solid #2a3242;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }

    h2 {
      color: #f4c430;
      margin-top: 0;
      font-weight: 800;
      margin-bottom: 10px;
    }

    p {
      color: #aaa;
      font-size: 14px;
      margin-bottom: 25px;
      line-height: 1.6;
    }

    /* ── Input group ── */
    .input-group {
      margin-bottom: 20px;
      text-align: left;
    }
    .input-group label {
      display: block;
      font-size: 14px;
      color: #f4c430;
      margin-bottom: 8px;
      font-weight: 600;
      padding-left: 4px;
    }
    input {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid #333;
      background: #0f1015;
      color: #fff;
      font-size: 16px;
      box-sizing: border-box;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #f4c430; }

    /* ── Save button ── */
    button.btn-save {
      width: 100%;
      padding: 15px;
      border-radius: 10px;
      border: none;
      background: #f4c430;
      color: #111;
      font-weight: 800;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.1s, background 0.2s;
    }
    button.btn-save:hover   { background: #e5b82d; }
    button.btn-save:active  { transform: scale(0.98); }
    button.btn-save:disabled { opacity: 0.55; pointer-events: none; }

    /* ── Discord suggestion banner ── */
    .discord-suggestion {
      display: none;
      background: linear-gradient(135deg, #3c4270, #2b2f54);
      border: 1px solid #5865F2;
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 18px;
      text-align: left;
      position: relative;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .discord-suggestion .ds-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .discord-suggestion .ds-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 2px solid #5865F2;
      flex-shrink: 0;
    }
    .discord-suggestion .ds-info { flex: 1; min-width: 0; }
    .discord-suggestion .ds-label { font-size: 11px; color: #8892b0; margin-bottom: 2px; }
    .discord-suggestion .ds-name {
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .discord-suggestion .ds-server-badge {
      display: inline-block;
      background: #5865F220;
      border: 1px solid #5865F260;
      color: #a5b4fc;
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 20px;
      margin-top: 4px;
    }
    .discord-suggestion .ds-btns { display: flex; gap: 8px; margin-top: 2px; }
    .discord-suggestion .ds-btn {
      flex: 1;
      padding: 8px;
      border-radius: 8px;
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .discord-suggestion .ds-btn:hover { opacity: 0.85; }
    .discord-suggestion .ds-btn-apply { background: #5865F2; color: #fff; }
    .discord-suggestion .ds-btn-skip  { background: #2a3242; color: #8892b0; }
    .discord-suggestion .ds-close {
      position: absolute;
      top: 10px; right: 12px;
      background: none; border: none;
      color: #4a5568; font-size: 16px;
      cursor: pointer; line-height: 1;
    }

    /* ── Loading overlay ── */
    #loadingOverlay {
      position: fixed;
      inset: 0;
      background: rgba(15,16,21,0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    .loading-spinner {
      width: 40px; height: 40px;
      border: 3px solid #2a3242;
      border-top-color: #f4c430;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { margin-top: 16px; color: #f4c430; font-size: 14px; letter-spacing: 1px; }
  </style>
</head>
<body>

  <!-- ══ Loading Overlay ══ -->
  <div id="loadingOverlay">
    <div class="loading-spinner"></div>
    <span class="loading-text">Phoenix Guild</span>
  </div>

  <!-- ══ Header (latest structure) ══ -->
  <header>
    <!-- Left: logo -->
    <div class="header-left">
      <span class="logo" onclick="location.href='main.html'">PHOENIX</span>
    </div>

    <!-- Centre: banner image -->
    <img
      src="assets/Phoenix_header.jpg"
      alt="Phoenix Guild"
      class="header-banner-center"
      onclick="location.href='main.html'"
    >

    <!-- Right: user chip -->
    <div class="header-right">
      <div class="header-user-chip">
        <img id="userPhoto" src="assets/icon-192.png" alt="profile"
             onerror="this.src='assets/icon-192.png'">
        <span id="userName">Loading…</span>
      </div>
    </div>
  </header>

  <!-- ══ Main content ══ -->
  <div class="container">
    <div class="card">
      <h2>Set Your Nickname</h2>
      <p>Please enter your in-game nickname<br>to register with the guild system.</p>

      <!-- Discord auto-fill banner (shown only on Discord login) -->
      <div class="discord-suggestion" id="discordSuggestion">
        <button class="ds-close" onclick="dismissDiscordSuggestion()" title="Dismiss">✕</button>
        <div class="ds-header">
          <img class="ds-avatar" id="dsAvatar" src="" alt="">
          <div class="ds-info">
            <div class="ds-label">Suggested from Discord</div>
            <div class="ds-name" id="dsName">—</div>
            <span class="ds-server-badge" id="dsServerBadge" style="display:none">Server Nickname</span>
          </div>
        </div>
        <div class="ds-btns">
          <button class="ds-btn ds-btn-apply" onclick="applyDiscordNick()">✅ Use this name</button>
          <button class="ds-btn ds-btn-skip"  onclick="dismissDiscordSuggestion()">Type manually</button>
        </div>
      </div>

      <div class="input-group">
        <label for="nicknameInput">In-game Nickname</label>
        <input
          type="text"
          id="nicknameInput"
          placeholder="Enter your in-game nickname"
          autocomplete="off"
          maxlength="30"
        />
      </div>

      <button class="btn-save" onclick="saveNickname()">Save &amp; Submit</button>
    </div>
  </div>

  <script>
    // ── Discord suggestion banner ─────────────────────────────────────
    let _discordSuggestedNick = '';

    function initDiscordSuggestion() {
      try {
        const raw = sessionStorage.getItem('discord_user');
        if (!raw) return;
        sessionStorage.removeItem('discord_user'); // one-time use
        const du = JSON.parse(raw);

        // Priority: server nick > globalName > username
        const nick = du.serverNick || du.globalName || du.username || '';
        if (!nick) return;

        _discordSuggestedNick = nick;

        document.getElementById('dsAvatar').src = du.avatar || '';
        document.getElementById('dsName').textContent = nick;

        if (du.serverNick) {
          document.getElementById('dsServerBadge').style.display = 'inline-block';
        }

        document.getElementById('discordSuggestion').style.display = 'block';
        document.getElementById('nicknameInput').value = nick;

        console.log('[Discord] Auto-fill nick:', nick, '(serverNick:', du.serverNick, ')');
      } catch(e) {
        console.warn('[Discord] suggestion init error:', e);
      }
    }

    function applyDiscordNick() {
      document.getElementById('nicknameInput').value = _discordSuggestedNick;
      dismissDiscordSuggestion();
      document.getElementById('nicknameInput').focus();
    }

    function dismissDiscordSuggestion() {
      document.getElementById('discordSuggestion').style.display = 'none';
    }

    // ── Auth state ───────────────────────────────────────────────────
    auth.onAuthStateChanged((user) => {
      const ol = document.getElementById('loadingOverlay');
      if (ol) ol.style.display = 'none';
      if (!user) return location.replace('login.html');

      // Update profile photo
      const photoEl = document.getElementById('userPhoto');
      const photoSrc = user.customPhotoURL || user.photoURL;
      if (photoSrc && photoEl) photoEl.src = photoSrc;

      // Display name
      const displayName = user.displayName ||
        (user.uid && user.uid.startsWith('discord:') ? 'Discord User' : 'User');
      document.getElementById('userName').textContent = displayName;

      // Discord suggestion
      initDiscordSuggestion();
    });

    // ── Save nickname ────────────────────────────────────────────────
    async function saveNickname() {
      const user     = auth.currentUser;
      const nickname = document.getElementById('nicknameInput').value.trim();
      const btn      = document.querySelector('.btn-save');

      if (!nickname) {
        showToast('Please enter your nickname.', 'warning');
        return;
      }

      if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; btn.style.opacity = '0.6'; }
      localStorage.setItem('nickname', nickname);

      // ── Geo detection (4-provider fallback) ──
      let geoInfo = {};
      const GEO_PROVIDERS = [
        { url: 'https://ipapi.co/json/',             parse: d => ({ code: d.country_code, city: d.city, tz: d.timezone }) },
        { url: 'https://freeipapi.com/api/json/',    parse: d => ({ code: d.countryCode,  city: d.cityName, tz: d.timeZone }) },
        { url: 'https://ipwho.is/',                  parse: d => ({ code: d.country_code, city: d.city, tz: d.timezone?.id }) },
        { url: 'https://get.geojs.io/v1/ip/geo.json', parse: d => ({ code: d.country_code, city: d.city, tz: d.timezone }) }
      ];
      for (const p of GEO_PROVIDERS) {
        try {
          const r = await fetch(p.url, { signal: AbortSignal.timeout(4000) });
          if (!r.ok) continue;
          const d = await r.json();
          const info = p.parse(d);
          if (info.code && /^[A-Z]{2}$/i.test(info.code)) {
            geoInfo = { code: info.code.toUpperCase(), city: info.city || null, tz: info.tz || null };
            break;
          }
        } catch(e) { /* try next provider */ }
      }

      try {
        const isDiscordUser = user.uid && user.uid.startsWith('discord:');

        if (isDiscordUser) {
          // Discord user: role/uid already set by Cloud Function
          // Only update nickname + geo (never touch role/uid/email — Firestore rules block it)
          await db.collection('users').doc(user.uid).set({
            nickname,
            loginProvider: 'discord',
            ...(geoInfo.code && {
              country     : geoInfo.code,
              geoCity     : geoInfo.city     || null,
              geoTimezone : geoInfo.tz       || null,
              geoProvider : 'nickname-signup',
              geoUpdatedAt: firebase.firestore.FieldValue.serverTimestamp()
            }),
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
          }, { merge: true });

          showToast('Nickname saved! ✅', 'success', 2000);
          // Discord users are already approved → go straight to main
          setTimeout(() => location.replace('main.html'), 1200);

        } else {
          // Regular user (Google, etc.): set role: pending, await admin approval
          await db.collection('users').doc(user.uid).set({
            nickname,
            role : 'pending',
            email: user.email || null,
            uid  : user.uid,
            ...(geoInfo.code && {
              country     : geoInfo.code,
              geoCity     : geoInfo.city     || null,
              geoTimezone : geoInfo.tz       || null,
              geoProvider : 'nickname-signup',
              geoUpdatedAt: firebase.firestore.FieldValue.serverTimestamp()
            }),
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
          }, { merge: true });

          showToast('Nickname saved! Awaiting approval. ✅', 'success', 2000);
          setTimeout(() => location.replace('pending.html'), 1200);
        }
      } catch (error) {
        if (btn) { btn.disabled = false; btn.textContent = 'Save & Submit'; btn.style.opacity = ''; }
        showToast('Save failed: ' + error.message, 'error');
        console.error('nickname save error:', error);
      }
    }
  </script>

</body>
</html>
