<!DOCTYPE html>
<html lang="ko">
<head>
  <!-- DNS Prefetch & Preconnect for performance -->
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://identitytoolkit.googleapis.com" crossorigin>
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
  <link rel="dns-prefetch" href="https://fonts.googleapis.com">
  <link rel="dns-prefetch" href="https://ui-avatars.com">

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>ROIDER · 관리자 승인 대기</title>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <script src="firebase_key.js"></script>
  <script src="firebase_config.js"></script>
  <script src="ui_utils.js"></script>
  <script src="i18n.js" defer></script>
  <script src="i18n_added.js" defer></script>

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(circle at top, #1b2333, #0f1015 60%);
      color: #e6e6e6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: linear-gradient(180deg, #1f2736, #161b26);
      border: 1px solid #2a3242;
      border-radius: 24px;
      padding: 60px 40px;
      text-align: center;
      max-width: 400px;
      width: 85%;
      box-shadow: 0 20px 50px rgba(0,0,0,0.7);
    }
    h1 { 
      color: #f4c430; 
      margin-bottom: 15px; 
      letter-spacing: 1px; 
      font-size: 28px;
      font-weight: 900;
    }
    .status-text {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 8px;
    }
    .desc-text { 
      opacity: 0.7; 
      font-size: 14px;
      line-height: 1.6;
      margin: 0;
    }
    .hourglass { 
      font-size: 50px; 
      margin: 30px 0; 
      display: inline-block;
      animation: spin 2.5s infinite ease-in-out; 
    }
    
    @keyframes spin { 
      0% { transform: rotate(0deg); } 
      50% { transform: rotate(180deg); }
      100% { transform: rotate(360deg); } 
    }

    .btn-logout-small {
      margin-top: 40px;
      background: transparent;
      border: 1px solid #444;
      color: #888;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }
    .btn-logout-small:hover {
      border-color: #ff5252;
      color: #ff5252;
    }

    .live-badge {
      margin-top: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 12px;
      color: #5aff8a;
      opacity: 0.75;
    }
    .live-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #5aff8a;
      animation: pulse-dot 1.6s infinite;
    }
    @keyframes pulse-dot {
      0%,100% { transform: scale(1); opacity:1; }
      50% { transform: scale(1.4); opacity:0.5; }
    }

    /* 텍스트 줄바꿈 - 긴 닉네임/URL 삐져나옴 방지 */
    .notice-card, .user-card, .info-text, td, th { word-break: keep-all; overflow-wrap: break-word; }
  </style>
</head>
<body>

  <!-- 언어 토글 버튼 -->
  <div style="position:fixed; top:16px; right:16px; z-index:100;">
    <button id="langBtn" onclick="toggleLanguage()"
      style="background:rgba(255,255,255,0.08); border:1px solid #444; color:#ccc;
             padding:5px 12px; border-radius:20px; font-size:12px; cursor:pointer;">
      🌐 EN
    </button>
  </div>

  <div class="card">
    <h1 id="appTitle">ROIDER GUILD</h1>
    <div class="hourglass">⏳</div>
    <p class="status-text" data-i18n="login_pending">⏳ 관리자 승인 대기중</p>
    <p class="desc-text" data-i18n="login_pending_desc">승인 후 시스템에 자동으로 접속됩니다.<br>잠시만 기다려 주세요.</p>
    
    <button class="btn-logout-small" onclick="logout()" data-i18n="btn_logout">로그아웃</button>
    <div class="live-badge">
      <span class="live-dot"></span>
      <span data-i18n="pending_live">실시간 감시 중 · 승인 즉시 자동 이동</span>
    </div>
  </div>

  <script>
    // 페이지 로드 시 언어 적용
    document.addEventListener("DOMContentLoaded", () => {
      if (typeof applyLanguage === "function") applyLanguage();
    });

    auth.onAuthStateChanged((user) => {
      if (!user) {
        location.replace("login.html");
        return;
      }

      // 해당 유저 문서 실시간 감시
      const userRef = db.collection("users").doc(user.uid);

      userRef.onSnapshot((doc) => {
        if (!doc.exists) return;

        const data = doc.data();

        // 🔥 역할(role)이 pending이 아니게 변경되는 순간 메인으로 이동
        if (data.role && data.role !== "pending") {
          // 승인되었음을 알리는 메시지 처리 (선택사항)
          console.log("Status changed to:", data.role);
          location.replace("main.html");
        }
      }, (error) => {
        console.error("Snapshot error:", error);
        showToast("연결 오류가 발생했습니다. 새로고침 해주세요.", "error");
      });
    });

    // 로그아웃 함수 (firebase_config.js에 정의되어 있지 않을 경우 대비)
    if (typeof logout !== "function") {
      function logout() {
        auth.signOut().then(() => location.replace("login.html"));
      }
    }
  </script>

</body>
</html>
